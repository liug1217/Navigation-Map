<style>
/* ===== OpenStreetMap Layer ===== */
#map{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
} 

/* UI must be above map */
.rect2,.bottomBar,.rect4{
  z-index:2;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#C5DCF0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

.bottomBar{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:166px;
}

.rect1{
  box-sizing:border-box;
  position:absolute;
  left:8px;
  right:8px;
  top:0;
  height:166px;
  border-width:1.5px 1.5px 0 1.5px;
  border-style:solid;
  border-color:#FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);
  border-radius:11px 11px 0 0;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.rect3{
  position:absolute;
  width:46px;
  height:4px;
  left:50%;
  top:5px;
  transform:translateX(-50%);
  background:#74767A;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);

}

.info{

  top:11px;

  font-weight:500;
  font-size:20px;
  color:#000000;
  white-space:nowrap;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}

.rect4{
  box-sizing:border-box;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:176px;
  width:auto;
  max-width:calc(100% - 16px);
  height:33px;
  padding:0 13px;
  background:#FFFFFF;
  border:1.5px solid #FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);

  display:flex;
  align-items:center;
  justify-content:center;
  gap:0px;
  z-index:5;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);

.rect4-inner{

}

.rect4 .label{

  font-size:16px;

  white-space:nowrap;
  overflow:hidden;

}

.rect4 .icon{

.rect8{

  left:8px;
  top:54px;

  border-radius:12px;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
}

.rect6{

  height:76px;
  left:8px;
  top:132px;

.navInfoCardIcon{

/* ===== рҹ“· CCTV еҚіжҷӮеҪұеғҸ:зҪ®дёӯеӨ§е°әеҜёеҪҲеҮәиҰ–зӘ— ===== */
.cctvOverlay{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:88%;
  max-width:640px;
  padding:14px;
  box-sizing:border-box;
  background:rgba(14,26,45,0.95);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 12px 40px rgba(0,0,0,0.45);

  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);

html, body {

  padding: 0;

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<script>
let userMarker = null;

function updateUserLocation(position) {
  const lng = position.coords.longitude;
  const lat = position.coords.latitude;

  const el = document.createElement('div');
  el.style.width = '16px';
  el.style.height = '16px';
  el.style.borderRadius = '50%';
  el.style.background = '#2F80FF';
  el.style.border = '3px solid white';
  el.style.boxShadow = '0 0 10px rgba(47,128,255,0.6)';

  if (userMarker) userMarker.remove();

  userMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat([lng, lat])
    .addTo(map);

  map.easeTo({ center: [lng, lat], zoom: 16 });
}

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(updateUserLocation);
}
</script>
<script src="https://unpkg.com/@maplibre/maplibre-gl-geocoder/dist/maplibre-gl-geocoder.min.js"></script>
<script>
  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: [121.394, 24.951],
    zoom: 16,
    pitch: 60,
    bearing: -20,
    antialias: true
  });

  map.on('load', () => {
    map.dragRotate.enable();
    map.touchZoomRotate.enableRotation();
    map.boxZoom.disable();
    map.scrollZoom.enable();
    map.dragPan.enable();
  });

  map.on('load',()=>{

const geolocate = new maplibregl.GeolocateControl({
  positionOptions: {
    enableHighAccuracy: true
  },
  trackUserLocation: true,
  showUserHeading: true
});

map.addControl(geolocate);
geolocate.trigger();
    const layers = map.getStyle().layers;
    let labelLayerId;

    for (let i = 0; i < layers.length; i++) {
      if (layers[i].type === 'symbol') {
        labelLayerId = layers[i].id;
        break;
      }
    }

    map.addLayer(
      {
        id: '3d-buildings',
        source: 'openmaptiles',
        'source-layer': 'building',
        type: 'fill-extrusion',
        minzoom: 15,
        paint: {
        'fill-extrusion-height': 0.1,
        'fill-extrusion-base': 0,
          'fill-extrusion-color': '#aaa',
          'fill-extrusion-height': [
            'interpolate',
            ['linear'],
            ['zoom'],
            15,
            0,
            15.05,
            ['get', 'height']
          ],
          'fill-extrusion-base': [
            'interpolate',
            ['linear'],
            ['zoom'],
            15,
            0,
            15.05,
            ['get', 'min_height']
          ],
          'fill-extrusion-opacity': 0.8
        }
      },
      labelLayerId
    );
  });
  map.addControl(new maplibregl.NavigationControl());


  const infoElement = document.querySelector('.info');
  const rect6SpeedValue = document.querySelector('.rect6 .speed-value');
  const rect6SpeedUnit = document.querySelector('.rect6 .speed-unit');
  
  let startTime = null;
  let lastPosition = null;
  let totalDistance = 0;
  let routeCoordinates = [];
  let marker = null;
  let routeSource = null;

  // ===== рҹҶ• йҖҖеҮә / е…ЁиҰҪ жҢүйҲ• =====
  const navExitBtn = document.getElementById('navExitBtn');
  const navOverviewBtn = document.getElementById('navOverviewBtn');

        location.reload();
      }
    });
  }

  if(navOverviewBtn){
    navOverviewBtn.addEventListener('click', () => {
      if(routeCoordinates.length < 2){
        // йӮ„жІ’жңүи¶іеӨ зҡ„и·Ҝз·ҡиіҮж–ҷ,зӣҙжҺҘжҠҠзӣ®еүҚдҪҚзҪ®зё®е°ҸзңӢдёҖдёӢйҖұйӮҠ
        if(routeCoordinates.length === 1){
          map.easeTo({ center: routeCoordinates[0], zoom: 13 });
        }
        return;
      }
      const lons = routeCoordinates.map(c => c[0]);
      const lats = routeCoordinates.map(c => c[1]);
      const bounds = [
        [Math.min(...lons), Math.min(...lats)],
        [Math.max(...lons), Math.max(...lats)]
      ];

      { id: "CCTV-N3-N-376.230-M", road: "еңӢйҒ“3иҷҹ зҰҸзҲҫж‘©жІҷй«ҳйҖҹе…¬и·Ҝ еҢ—", url: "http://cctvs.freeway.gov.tw/live-view/mjpg/video.cgi?camera=491", lon: 0, lat: 0, mile: "376K+230", hidden: true }
,
      { id: "CCTV-T78-E-15.170-M", road: "еҝ«йҖҹе…¬и·Ҝ78иҷҹ", url: "https://cctvc.freeway.gov.tw/abs2mjpg/bmjpg?camera=45", lon: 120.321664, lat: 23.687137, mile: "15K+170" },
      { id: "CCTV-T78-E-20.000-M", road: "еҝ«йҖҹе…¬и·Ҝ78иҷҹ", url: "https://cctvc.freeway.gov.tw/abs2mjpg/bmjpg?camera=44", lon: 120.365555, lat: 23.688456, mile: "20K+000" },
      { id: "CCTV-T78-E-36.295-M", road: "еҝ«йҖҹе…¬и·Ҝ78иҷҹ", url: "https://cctvc.freeway.gov.tw/abs2mjpg/bmjpg?camera=47", lon: 120.508538, lat: 23.662538, mile: "36K+295" },
      { id: "CCTV-T78-W-11.320-M", road: "еҝ«йҖҹе…¬и·Ҝ78иҷҹ", url: "https://cctvc.freeway.gov.tw/abs2mjpg/bmjpg?camera=46", lon: 120.285362, lat: 23.689817, mile: "11K+320" }
    ];

    // и®“зӣЈиҰ–еҷЁжё…е–®еҸҜд»Ҙиў«е…¶д»– <script> еҚҖеЎҠ(GPS е®ҡдҪҚжӣҙж–°йӮҸијҜ)еӯҳеҸ–,з”Ёж–јеҲӨж–·дҪҝз”ЁиҖ…жҳҜеҗҰз¶“йҒҺзӣЈиҰ–еҷЁйҷ„иҝ‘
    window.cctvCameras = cctvCameras;

    // зөұдёҖзҡ„жЁҷзұӨз”ўз”ҹйӮҸијҜ,й»һж“Ҡи·ҹе®ҡдҪҚиҮӘеӢ•и§ёзҷјйғҪе…ұз”ЁеҗҢдёҖеҘ—,зўәдҝқйЎҜзӨәж јејҸдёҖиҮҙ
    window.buildCctvLabel = function(cam){
      return cam.section
        ? cam.road + " " + cam.section + " " + cam.mile + "пјҲ" + cam.id + "пјү"
        : cam.road + " " + cam.mile + "пјҲ" + cam.id + "пјү";
    };

    cctvCameras.forEach(cam => {
      if (cam.hidden) return; // еә§жЁҷжңүе•ҸйЎҢзҡ„зӣЈиҰ–еҷЁ,е…Ҳйҡұи—ҸдёҚйЎҜзӨәеңЁең°ең–дёҠ

      const el = document.createElement('div');
      el.style.width = '26px';
      el.style.height = '26px';
      el.style.borderRadius = '50%';
      el.style.background = '#0E1A2D';
      el.style.border = '2px solid #FFFFFF';
      el.style.boxShadow = '0 2px 5px rgba(0,0,0,0.4)';
      el.style.display = 'flex';
      el.style.alignItems = 'center';
      el.style.justifyContent = 'center';
      el.style.fontSize = '13px';
      el.style.cursor = 'pointer';
      el.textContent = 'рҹ“·';

      const label = window.buildCctvLabel(cam);
      const url = cam.url;

      el.addEventListener('click', () => {
        // жүӢеӢ•й»һж“Ҡең–зӨә(isAuto = false),и·ҹе®ҡдҪҚиҮӘеӢ•и§ёзҷј(isAuto = true)еҲҶй–ӢжЁҷиЁҳ
        window.switchCctvCamera(url, label, cam.id, false);
      });

      new maplibregl.Marker({ element: el, anchor: 'center' })
        .setLngLat([cam.lon, cam.lat])
        .addTo(map);
    });

    routeSource = map.getSource('route');

    const A = [121.39431694905831, 24.95161377427496];
    const B = [121.40117103967137, 24.950945728162928];
    const C = [121.40115004678125, 24.95076327043688];
    const D = [121.39428811531214, 24.951394298417927];

    const polygon = [[
      A, B, C, D, A
    ]];

    routeSource.setData({
      type: 'FeatureCollection',
      features: [{
        type: 'Feature',
        geometry: {
          type: 'Polygon',
          coordinates: polygon
        }
      }]
    });

  });

  function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = 
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  // ===== рҹ“· е®ҡдҪҚз¶“йҒҺзӣЈиҰ–еҷЁйҷ„иҝ‘жҷӮиҮӘеӢ•йЎҜзӨә =====
  const CCTV_AUTO_SHOW_RADIUS_KM = 0.1; // 100 е…¬е°әе…§иҰ–зӮәгҖҢз¶“йҒҺгҖҚ

  function checkCctvProximity(lat, lon){
    const cameras = window.cctvCameras;
    if(!cameras || !cameras.length) return;

    // жүҫеҮәзҜ„еңҚе…§жңҖиҝ‘зҡ„дёҖж”ҜзӣЈиҰ–еҷЁ
    let nearest = null;
    let nearestDist = Infinity;
    for(let i = 0; i < cameras.length; i++){
      const cam = cameras[i];
      if (cam.hidden) continue; // еә§жЁҷжңүе•ҸйЎҢзҡ„зӣЈиҰ–еҷЁ,дёҚеҸғиҲҮе®ҡдҪҚжҺҘиҝ‘еҒөжё¬
      const d = calculateDistance(lat, lon, cam.lat, cam.lon);
      if(d <= CCTV_AUTO_SHOW_RADIUS_KM && d < nearestDist){
        nearest = cam;
        nearestDist = d;
      }
    }

    if(nearest){
      // зҜ„еңҚе…§жңүзӣЈиҰ–еҷЁ,дё”йӮ„жІ’йЎҜзӨәйҖҷдёҖж”Ҝзҡ„з•«йқў,е°ұиҮӘеӢ•еҲҮжҸӣйҒҺеҺ»
      if(window.cctvActiveCameraId !== nearest.id){
        const label = window.buildCctvLabel ? window.buildCctvLabel(nearest) : (nearest.road + " " + nearest.mile);
        window.switchCctvCamera(nearest.url, label, nearest.id, true);
      }
    } else {
      // зҜ„еңҚеӨ–:еҰӮжһңзӣ®еүҚйЎҜзӨәзҡ„жҳҜгҖҢиҮӘеӢ•и§ёзҷјгҖҚй–Ӣзҡ„,е°ұиҮӘеӢ•й—ңй–ү;жүӢеӢ•й»һй–Ӣзҡ„з¶ӯжҢҒдёҚеӢ•
      if(window.cctvActiveCameraId && window.cctvActiveIsAuto){
        window.closeCctvOverlay();
      }
    }
  }

  function formatTime(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    return `${hours}е°ҸжҷӮ${minutes}еҲҶйҗҳ`;
  }

  function updateDisplay(speed, elapsedMs) {
    rect6SpeedValue.innerText = Math.round(speed);
    infoElement.innerText = `${formatTime(elapsedMs)} ${totalDistance.toFixed(2)}е…¬йҮҢ`;
  }

  // ===== е№іж»‘з§»еӢ•е®ҡдҪҚй»һ(з”ЁеӢ•з•«жҸ’еҖј,дёҚиҰҒзһ¬й–“и·іиҪү) =====
  let markerAnimFrame = null;
  let markerDisplayLngLat = null; // зӣ®еүҚз•«йқўдёҠеҜҰйҡӣйЎҜзӨәзҡ„дҪҚзҪ®(еӢ•з•«зҡ„иө·й»һ)

  function animateMarkerTo(targetLng, targetLat, duration){
    if(!marker) return;

    // з¬¬дёҖж¬ЎйӮ„жІ’жңүиө·й»һдҪҚзҪ®жҷӮ,зӣҙжҺҘе®ҡдҪҚйҒҺеҺ»,дёҚйңҖиҰҒеӢ•з•«
    if(!markerDisplayLngLat){
      markerDisplayLngLat = [targetLng, targetLat];
      marker.setLngLat(markerDisplayLngLat);
      return;
    }

    const startLng = markerDisplayLngLat[0];
    const startLat = markerDisplayLngLat[1];
    const startTimeMs = performance.now();

    if(markerAnimFrame){
      cancelAnimationFrame(markerAnimFrame);
    }

    function step(){
      const elapsed = performance.now() - startTimeMs;
      const t = Math.min(1, elapsed / duration);
      // easeOutCubic,и®“з§»еӢ•жңүиҮӘз„¶зҡ„жёӣйҖҹж„ҹ,дёҚжңғжӯ»жқҝең°зӯүйҖҹз§»еӢ•
      const eased = 1 - Math.pow(1 - t, 3);

      const lng = startLng + (targetLng - startLng) * eased;
      const lat = startLat + (targetLat - startLat) * eased;

      markerDisplayLngLat = [lng, lat];
      marker.setLngLat(markerDisplayLngLat);

      if(t < 1){
        markerAnimFrame = requestAnimationFrame(step);
      }
    }

    markerAnimFrame = requestAnimationFrame(step);
  }

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition((pos) => {
      const now = Date.now();
      const currentLat = pos.coords.latitude;
      const currentLon = pos.coords.longitude;
      const currentSpeed = pos.coords.speed || 0;

      if (!startTime) {
        startTime = now;
        lastPosition = { lat: currentLat, lon: currentLon };
        routeCoordinates = [[currentLon, currentLat]];
      }

      if (lastPosition) {
        const distance = calculateDistance(lastPosition.lat, lastPosition.lon, currentLat, currentLon);
        totalDistance += distance;
        lastPosition = { lat: currentLat, lon: currentLon };
      }

      if (lastPosition) {
        const d = calculateDistance(lastPosition.lat, lastPosition.lon, currentLat, currentLon);
        if (d > 0.005) {
          routeCoordinates.push([currentLon, currentLat]);
        }
      }

      if (routeSource) {
        routeSource.setData({
          type: 'FeatureCollection',
          features: [{
            type: 'Feature',
            geometry: {
              type: 'LineString',
              coordinates: routeCoordinates
            }
          }]
        });
      }

      map.easeTo({
        center: [currentLon, currentLat],
        zoom: 15,
        duration: 1000
      });

      if (!marker) {
        const el = document.createElement('div');
        el.style.width = '20px';
        el.style.height = '20px';
        el.style.backgroundColor = '#3b82f6';
        el.style.borderRadius = '50%';
        el.style.border = '2px solid white';
        el.style.boxShadow = '0 2px 4px rgba(0,0,0,0.3)';

        marker = new maplibregl.Marker(el).setLngLat([currentLon, currentLat]).addTo(map);
        markerDisplayLngLat = [currentLon, currentLat];
      } else {
        // з”Ё 1 з§’зҡ„е№іж»‘еӢ•з•«з§»еӢ•йҒҺеҺ»,иҖҢдёҚжҳҜзһ¬й–“и·іиҪүеҲ°ж–°еә§жЁҷ
        animateMarkerTo(currentLon, currentLat, 1000);
      }

      const elapsedMs = now - startTime;
      const speedKmh = currentSpeed * 3.6;

      updateDisplay(speedKmh, elapsedMs);
      requestRoadNameUpdate(currentLon, currentLat);

      // е®ҡдҪҚз¶“йҒҺзӣЈиҰ–еҷЁйҷ„иҝ‘жҷӮиҮӘеӢ•йЎҜзӨәеҪҲеҮәиҰ–зӘ—
      checkCctvProximity(currentLat, currentLon);

    }, (err) => {
      console.error('GPS error:', err);
      rect6SpeedValue.innerText = 'Г—';
      rect6SpeedUnit.innerText = 'GPS';
    }, {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 10000
    });
  } else {
    alert('жӮЁзҡ„зҖҸиҰҪеҷЁдёҚж”ҜжҸҙең°зҗҶе®ҡдҪҚеҠҹиғҪ');
  }
</script>

<script>
map.on('load', () => {

  let userMarker = null;

  const style = document.createElement('style');
  style.innerHTML = `
  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.7; }
    50% { transform: scale(1.6); opacity: 0.2; }
    100% { transform: scale(0.8); opacity: 0.7; }
  }
  `;
  document.head.appendChild(style);

  function createUserDot(lng, lat) {
    const el = document.createElement('div');

    el.style.width = '16px';
    el.style.height = '16px';
    el.style.borderRadius = '50%';
    el.style.background = '#2F80FF';
    el.style.border = '3px solid white';
    el.style.boxShadow = '0 0 12px rgba(47,128,255,0.8)';
    el.style.animation = 'pulse 1.4s infinite';

    return new maplibregl.Marker({
      element: el,
      anchor: 'center'
    }).setLngLat([lng, lat]);
  }

  navigator.geolocation.watchPosition((pos) => {
    const lng = pos.coords.longitude;
    const lat = pos.coords.latitude;

    if (userMarker) userMarker.remove();

    userMarker = createUserDot(lng, lat).addTo(map);

    map.easeTo({
      center: [lng, lat],
      duration: 800
    });

  }, (err) => {
    console.log("GPS error:", err);
  }, {
    enableHighAccuracy: true
  });

});
</script>
<script>
// ===== рҹӣЈпёҸ йҒ“и·ҜеҗҚзЁұжҹҘи©ўзҜҖжөҒжҺ§еҲ¶ =====
// Overpass API жҳҜе…¬й–Ӣе…ҚиІ»жңҚеӢҷ,еӨӘй »з№ҒжҹҘи©ўе®№жҳ“иў«йҷҗжөҒ/ж“ӢжҺү,
// жүҖд»ҘйҖҷиЈЎйҷҗеҲ¶гҖҢжңҖеҝ«е№ҫз§’жүҚиғҪжҹҘдёҖж¬ЎгҖҚ,иҖҢдё”еҗҢдёҖжҷӮй–“еҸӘе…ҒиЁұдёҖеҖӢи«ӢжұӮеңЁи·‘гҖӮ
const ROAD_NAME_MIN_INTERVAL_MS = 8000;
let roadNameLastFetchAt = 0;
let roadNameInFlight = false;
let roadNamePendingCoords = null;
let roadNameRequestSeq = 0;       // з”ЁдҫҶеҲӨж–·еӣһжҮүжҳҜдёҚжҳҜйҒҺжңҹзҡ„(йҒҝе…ҚиҲҠи«ӢжұӮжҷҡеӣһдҫҶи“ӢжҺүж–°зөҗжһң)
let roadNameLatestAppliedSeq = 0;

function requestRoadNameUpdate(lng, lat){
  const now = Date.now();

  if(roadNameInFlight){
    // е·Із¶“жңүи«ӢжұӮеңЁи·‘,е…ҲиЁҳдҪҸжңҖж–°дҪҚзҪ®,зӯүзӣ®еүҚйҖҷж¬ЎжҹҘе®ҢеҶҚз”ЁжңҖж–°зҡ„дҪҚзҪ®иЈңжҹҘдёҖж¬Ў
    roadNamePendingCoords = [lng, lat];
    return;
  }

  if(now - roadNameLastFetchAt < ROAD_NAME_MIN_INTERVAL_MS){
    // йӮ„жІ’еҲ°еҸҜд»ҘеҶҚжҹҘзҡ„жҷӮй–“,е…ҲиЁҳдҪҸжңҖж–°дҪҚзҪ®,жҷӮй–“еҲ°дәҶжңғиҮӘеӢ•иЈңжҹҘ
    roadNamePendingCoords = [lng, lat];
    return;
  }

  roadNamePendingCoords = null;
  roadNameLastFetchAt = now;
  roadNameInFlight = true;

  const mySeq = ++roadNameRequestSeq;

  updateRoadName(lng, lat, mySeq).finally(() => {
    roadNameInFlight = false;
    // жҹҘи©ўжңҹй–“еҰӮжһңе®ҡдҪҚеҸҲжӣҙж–°дәҶ,з”ЁжңҖж–°зҡ„дҪҚзҪ®з«ӢеҲ»иЈңжҹҘдёҖж¬Ў
    if(roadNamePendingCoords){
      const [pLng, pLat] = roadNamePendingCoords;
      roadNamePendingCoords = null;
      requestRoadNameUpdate(pLng, pLat);
    }
  });
}

async function updateRoadName(lng, lat, seq){
  try{
    const R = 6371e3;
    const toRad = Math.PI / 180;

    function getDistance(lat1, lon1, lat2, lon2){
      const dLat = (lat2 - lat1) * toRad;
      const dLon = (lon2 - lon1) * toRad;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toRad)*Math.cos(lat2*toRad)*Math.sin(dLon/2)**2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    const query = `
    [out:json];
    way(around:10,${lat},${lng})["highway"]["name"];
    out center;
    `;

    // еҠ дёҠйҖҫжҷӮдҝқиӯ·,йҒҝе…ҚOverpassеҸҚжҮүеӨӘж…ўжҷӮеҚЎдҪҸ,дёҖзӣҙеҚ з”ЁгҖҢзӣ®еүҚжңүи«ӢжұӮеңЁи·‘гҖҚзҡ„зӢҖж…Ӣ
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 6000);

    let res;
    try{
      res = await fetch("https://overpass-api.de/api/interpreter", {
        method: "POST",
        body: query,
        signal: controller.signal
      });
    } finally {
      clearTimeout(timeoutId);
    }

    if(!res.ok){
      console.log("road name http error", res.status);
      return;
    }

    const data = await res.json();

    // еҰӮжһңеңЁзӯүеҫ…еӣһжҮүзҡ„йҖҷж®өжҷӮй–“,е·Із¶“жңүжӣҙж–°зҡ„и«ӢжұӮйҖҒеҮәеҺ»дәҶ,йҖҷж¬Ўзҡ„зөҗжһңе°ұжҳҜйҒҺжңҹзҡ„,дёҚиҰҒеҘ—з”Ё
    if(seq < roadNameLatestAppliedSeq) return;

    let best = "жңӘзҹҘйҒ“и·Ҝ";
    let min = Infinity;
    let bestTags = null;

    if(data.elements){
      for(const el of data.elements){
        if(!el.center || !el.tags?.name) continue;

        const d = getDistance(lat, lng, el.center.lat, el.center.lon);

        if(d < min){
          min = d;
          best = el.tags.name;
          bestTags = el.tags;
        }
      }
    }

    let isFreeway = false;

    if(bestTags){
      const hw = bestTags.highway || "";
      const ref = bestTags.ref || "";
      const name = bestTags.name || "";

      isFreeway =
        (hw === "motorway" && ref.includes("3")) ||
        name.includes("еңӢйҒ“3") ||
        name.includes("еңӢйҒ“дёү") ||
        name.includes("зҰҸзҲҫж‘©жІҷ");
    }

    roadNameLatestAppliedSeq = seq;

    const label = document.getElementById("roadLabel");
    const icon = document.querySelector(".rect4 .icon");

    if(label) label.innerText = best;

    if(icon){
      icon.style.display = isFreeway ? "block" : "none";
    }

  }catch(e){
    console.log("road name error", e);
  }
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function(){

  // ===== рҹ“· CCTV еҚіжҷӮеҪұеғҸ:зҪ®дёӯеҪҲеҮәиҰ–зӘ—,е®ҡжңҹиҮӘеӢ•йҮҚж–°йҖЈз·ҡйҒҝе…ҚдёІжөҒж–·жҺүеҫҢз•«йқўеҚЎдҪҸ =====
  const cctvImage = document.getElementById("cctvImage");
  const cctvStatus = document.getElementById("cctvStatus");
  const cctvOverlay = document.getElementById("cctvOverlay");
  const cctvPanelTitle = document.getElementById("cctvPanelTitle");
  let CCTV_BASE_URL = "";
  let CCTV_CURRENT_LABEL = "";
  const CCTV_REFRESH_INTERVAL = 8000; // жҜҸ 8 з§’дё»еӢ•йҮҚж–°йҖЈз·ҡдёҖж¬Ў

  let cctvReloadTimer = null;

  function scheduleCctvReload(delay){
    // еҸӘз”ЁдёҖеҖӢиЁҲжҷӮеҷЁ,жҺ’ж–°зҡ„д№ӢеүҚе…ҲеҸ–ж¶ҲиҲҠзҡ„,йҒҝе…Қе…©еҖӢйҮҚйҖЈеӢ•дҪңдә’зӣёжү“жһ¶
    if(cctvReloadTimer){
      clearTimeout(cctvReloadTimer);
    }
    cctvReloadTimer = setTimeout(reloadCctvImage, delay);
  }

  function reloadCctvImage(){
    if(!cctvImage || !CCTV_BASE_URL) return;
    cctvImage.src = CCTV_BASE_URL + "&_t=" + Date.now();
    // жҜҸж¬ЎйҮҚйҖЈд№ӢеҫҢ,йҮҚж–°жҺ’дёӢдёҖж¬Ўзҡ„е®ҡжңҹйҮҚйҖЈ(дёҚз®ЎйҖҷж¬ЎжҳҜжӯЈеёёжҺ’зЁӢйӮ„жҳҜйҢҜиӘӨи§ёзҷјзҡ„)
    scheduleCctvReload(CCTV_REFRESH_INTERVAL);
  }

  // еҲҮжҸӣеҲ°ең°ең–дёҠй»һйҒёзҡ„жҹҗдёҖж”ҜзӣЈиҰ–еҷЁ,дёҰжү“й–ӢзҪ®дёӯеҪҲеҮәиҰ–зӘ—
  // camId: и©ІзӣЈиҰ–еҷЁзҡ„ id(з”Ёж–јиҝҪи№Өзӣ®еүҚйЎҜзӨәдёӯзҡ„жҳҜе“ӘдёҖж”Ҝ,йҒҝе…ҚйҮҚиӨҮи§ёзҷј)
  // isAuto: true д»ЈиЎЁжҳҜгҖҢе®ҡдҪҚз¶“йҒҺиҮӘеӢ•йЎҜзӨәгҖҚи§ёзҷјзҡ„,false д»ЈиЎЁжҳҜжүӢеӢ•й»һж“Ҡең–зӨәи§ёзҷјзҡ„
  window.switchCctvCamera = function(url, label, camId, isAuto){
    CCTV_BASE_URL = url;
    CCTV_CURRENT_LABEL = label;
    if(cctvPanelTitle) cctvPanelTitle.textContent = "рҹ“· " + label;
    if(cctvOverlay) cctvOverlay.classList.add("show");
    window.cctvActiveCameraId = camId || null;
    window.cctvActiveIsAuto = !!isAuto;
    reloadCctvImage();
  };

  // й—ңй–үеҪҲеҮәиҰ–зӘ—жҷӮ,еҒңжӯўйҮҚйҖЈиЁҲжҷӮеҷЁ,йҒҝе…ҚеңЁиғҢжҷҜдёҖзӣҙи·‘жөӘиІ»ж•ҲиғҪ
  window.closeCctvOverlay = function(){
    if(cctvOverlay) cctvOverlay.classList.remove("show");
    if(cctvReloadTimer){
      clearTimeout(cctvReloadTimer);
      cctvReloadTimer = null;
    }
    CCTV_BASE_URL = "";
    window.cctvActiveCameraId = null;
    window.cctvActiveIsAuto = false;
  };

  // ===== рҹ–ұпёҸ и®“еҪҲеҮәиҰ–зӘ—еҸҜд»ҘжӢ–еӢ•(жҠ“жЁҷйЎҢеҲ—з•¶жҠҠжүӢ,ж»‘йј /и§ёжҺ§йғҪж”ҜжҸҙ) =====
  if(cctvOverlay && cctvPanelTitle){
    let dragStartX = 0;
    let dragStartY = 0;
    let overlayStartLeft = 0;
    let overlayStartTop = 0;
    let dragging = false;

    function getPointerXY(e){
      if(e.touches && e.touches.length){
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    function startDrag(e){
      dragging = true;
      const rect = cctvOverlay.getBoundingClientRect();
      // з¬¬дёҖж¬ЎжӢ–еӢ•жҷӮ,жҠҠе®ҡдҪҚеҫһгҖҢзҪ®дёӯе…¬ејҸгҖҚжҸӣжҲҗеӣәе®ҡзҡ„еғҸзҙ еә§жЁҷ,д№ӢеҫҢжүҚиғҪз”Ё left/top иҮӘз”ұз§»еӢ•
      cctvOverlay.style.left = rect.left + "px";
      cctvOverlay.style.top = rect.top + "px";
      cctvOverlay.style.transform = "none";

      overlayStartLeft = rect.left;
      overlayStartTop = rect.top;

      const p = getPointerXY(e);
      dragStartX = p.x;
      dragStartY = p.y;

      e.preventDefault();
    }

    function onDragMove(e){
      if(!dragging) return;
      const p = getPointerXY(e);
      const dx = p.x - dragStartX;
      const dy = p.y - dragStartY;
      cctvOverlay.style.left = (overlayStartLeft + dx) + "px";
      cctvOverlay.style.top = (overlayStartTop + dy) + "px";
    }

    function stopDrag(){
      dragging = false;
    }

    cctvPanelTitle.addEventListener("mousedown", startDrag);
    cctvPanelTitle.addEventListener("touchstart", startDrag, { passive: false });

    document.addEventListener("mousemove", onDragMove);
    document.addEventListener("touchmove", onDragMove, { passive: false });

    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchend", stopDrag);
  }

  if(cctvImage){
    cctvImage.addEventListener("load", function(){
      if(cctvStatus) cctvStatus.textContent = CCTV_CURRENT_LABEL;
    });

    cctvImage.addEventListener("error", function(){
      if(cctvStatus) cctvStatus.textContent = "еҪұеғҸйҖЈз·ҡдёӯж–·,жӯЈеңЁйҮҚж–°йҖЈз·ҡ...";
      // ж–·з·ҡжҷӮжҸҗеүҚйҮҚйҖЈ,дёҰеҸ–ж¶ҲеҺҹжң¬жҺ’е®ҡзҡ„йӮЈдёҖж¬Ў,йҒҝе…Қе…©йӮҠеҗҢжҷӮи§ёзҷј
      scheduleCctvReload(3000);
    });
  }
});
</script>
