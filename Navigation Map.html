<title>Navigation Map</title>
<style>
/* ===== OpenStreetMap Layer ===== */
#map{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
} 

/* UI must be above map */
.rect2,.bottomBar,.rect4{
  z-index:2;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#C5DCF0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

/* ===== 底部整組（原形一起移動） ===== */
.bottomBar{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:96px;
}

.rect1{
  box-sizing:border-box;
  position:absolute;
  left:8px;
  right:8px;
  top:0;
  height:96px;
  border-width:2px 2px 0 2px;
  border-style:solid;
  border-color:#FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);
  border-radius:11px 11px 0 0;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.rect3{
  position:absolute;
  width:46px;
  height:4px;
  left:50%;
  top:5px;
  transform:translateX(-50%);
  background:#74767A;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);
  border-radius:2.5px;
}

.info{
  position:absolute;
  left:50%;
  top:11px;
  transform:translateX(-50%);
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:20px;
  color:#000000;
  white-space:nowrap;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}

/* ===== Rectangle 4 ===== */
.rect4{
  box-sizing:border-box;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:106px;
  width:174px;
  height:33px;
  background:#FFFFFF;
  border:2px solid #FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  border-radius:16.5px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0px;
  z-index:5;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.rect4 .label{
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:16px;
  color:#000000;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}

.rect4 .icon{
  width:20px;
  height:20px;
  background:url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/TWHW3.svg/120px-TWHW3.svg.png') center/cover no-repeat;
  filter:drop-shadow(0px 4px 4px rgba(0,0,0,0.25));
}

/* ===== Rectangle 8 ===== */
.rect8{
  position:absolute;
  width:calc(100% - 16px);
  height:69px;
  left:8px;
  top:54px;
  background:#0E1A2D;
  border-radius:12px;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
}

/* ===== Rectangle 6（GPS圓形：中間顯示速度） ===== */
.rect6{
  position:absolute;
  width:76px;
  height:76px;
  left:8px;
  top:132px;
  background:#FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  border-radius:38px;

  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction: column;

  font-weight:400;
  color:#000000;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

.rect6 .speed-value {

.rect6 .speed-unit {

/* ===== 全部 Marker 圖示統一大小 ===== */
.maplibregl-marker img{
  width:40px !important;
  height:auto !important;
  object-fit:contain;
  display:block;
}
/* ===== 📍 使用者定位藍色圖標 ===== */
.maplibregl-user-location-dot{
  background-color:#1E90FF !important;
  width:14px !important;
  height:14px !important;
  border-radius:50%;
  border:2px solid #ffffff !important;
  box-shadow:0 0 0 6px rgba(30,144,255,0.25);

.maplibregl-user-location-accuracy-circle{
  fill:rgba(30,144,255,0.15) !important;
}

/* 🔒 Lock UI (prevent page move) */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;

body {

// ===== 📍 Google-style 藍色定位點 =====
let userMarker = null;

function updateUserLocation(position) {
  const lng = position.coords.longitude;
  const lat = position.coords.latitude;

  const el = document.createElement('div');
  el.style.width = '16px';
  el.style.height = '16px';
  el.style.borderRadius = '50%';
  el.style.background = '#2F80FF';
  el.style.border = '3px solid white';
  el.style.boxShadow = '0 0 10px rgba(47,128,255,0.6)';

  if (userMarker) userMarker.remove();

  userMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat([lng, lat])
    .addTo(map);

  map.easeTo({ center: [lng, lat], zoom: 16 });
}

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(updateUserLocation);
}
</script>

      img.style.width = '40px';
      img.style.height = 'auto';
      img.style.display = 'block';
      img.style.objectFit = 'contain';

      new maplibregl.Marker({ element: img, anchor: 'center' })
        .setLngLat(coord)
        .addTo(map);
    });

    routeSource = map.getSource('route');

    // 四點區域
    const A = [121.39431694905831, 24.95161377427496]; // 左上
    const B = [121.40117103967137, 24.950945728162928]; // 右上
    const C = [121.40115004678125, 24.95076327043688]; // 右下
    const D = [121.39428811531214, 24.951394298417927]; // 左下

    const polygon = [[
      A, B, C, D, A
    ]];

    routeSource.setData({
      type: 'FeatureCollection',
      features: [{
        type: 'Feature',
        geometry: {
          type: 'Polygon',
          coordinates: polygon
        }
      }]
    });

  });

  // Calculate distance between two coordinates using Haversine formula
  function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; // Earth's radius in km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = 
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  // Format time display
  function formatTime(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    return `${hours}小時${minutes}分鐘`;
  }

  // Update GPS info display
  function updateDisplay(speed, elapsedMs) {
    rect6SpeedValue.innerText = Math.round(speed);
    infoElement.innerText = `${formatTime(elapsedMs)} ${totalDistance.toFixed(2)}公里`;
  }

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition((pos) => {
      const now = Date.now();
      const currentLat = pos.coords.latitude;
      const currentLon = pos.coords.longitude;
      const currentSpeed = pos.coords.speed || 0; // speed in m/s

      if (!startTime) {
        startTime = now;
        lastPosition = { lat: currentLat, lon: currentLon };
        routeCoordinates = [[currentLon, currentLat]];
      }

      // Calculate distance traveled
      if (lastPosition) {
        const distance = calculateDistance(lastPosition.lat, lastPosition.lon, currentLat, currentLon);
        totalDistance += distance;
        lastPosition = { lat: currentLat, lon: currentLon };
      }

      // Update route coordinates（避免GPS抖動亂畫）
      if (lastPosition) {
        const d = calculateDistance(lastPosition.lat, lastPosition.lon, currentLat, currentLon);
        if (d > 0.005) { // 大於5公尺才加入
          routeCoordinates.push([currentLon, currentLat]);
        }
      }

      // Update route on map
      if (routeSource) {
        routeSource.setData({
          type: 'FeatureCollection',
          features: [{
            type: 'Feature',
            geometry: {
              type: 'LineString',
              coordinates: routeCoordinates
            }
          }]
        });
      }

      // Update map center and marker
      map.flyTo({
        center: [currentLon, currentLat],
        zoom: 15,
        speed: 0.5
      });

      // Marker只建立一次
      if (!marker) {
        const el = document.createElement('div');
        el.style.width = '20px';
        el.style.height = '20px';
        el.style.backgroundColor = '#3b82f6';
        el.style.borderRadius = '50%';
        el.style.border = '2px solid white';
        el.style.boxShadow = '0 2px 4px rgba(0,0,0,0.3)';

        marker = new maplibregl.Marker(el).setLngLat([currentLon, currentLat]).addTo(map);
      } else {
        marker.setLngLat([currentLon, currentLat]);
      }

      // Calculate elapsed time
      const elapsedMs = now - startTime;

      // Convert speed from m/s to km/h
      const speedKmh = currentSpeed * 3.6;

      // Update display
      updateDisplay(speedKmh, elapsedMs);
      // 🛣️ 即時道路偵測
      updateRoadName(currentLon, currentLat);
      console.log('road update trigger', currentLon, currentLat);
      updateRoadName(currentLon, currentLat);

    }, (err) => {
      console.error('GPS error:', err);
      rect6SpeedValue.innerText = '×';
      rect6SpeedUnit.innerText = 'GPS';
    }, {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 10000
    });
  } else {
    alert('您的瀏覽器不支援地理定位功能');
  }
</script>

<script>
// ===== 📍 Google 呼吸藍點（100%生效版）=====

map.on('load', () => {

  let userMarker = null;

  // 呼吸動畫
  const style = document.createElement('style');
  style.innerHTML = `
  @keyframes pulse {
    0% { transform: scale(0.8); opacity: 0.7; }
    50% { transform: scale(1.6); opacity: 0.2; }
    100% { transform: scale(0.8); opacity: 0.7; }
  }
  `;
  document.head.appendChild(style);

  function createUserDot(lng, lat) {
    const el = document.createElement('div');

    el.style.width = '16px';
    el.style.height = '16px';
    el.style.borderRadius = '50%';
    el.style.background = '#2F80FF';
    el.style.border = '3px solid white';
    el.style.boxShadow = '0 0 12px rgba(47,128,255,0.8)';
    el.style.animation = 'pulse 1.4s infinite';

    return new maplibregl.Marker({
      element: el,
      anchor: 'center'
    }).setLngLat([lng, lat]);
  }

  navigator.geolocation.watchPosition((pos) => {
    const lng = pos.coords.longitude;
    const lat = pos.coords.latitude;

    if (userMarker) userMarker.remove();

    userMarker = createUserDot(lng, lat).addTo(map);

    map.easeTo({
      center: [lng, lat],
      duration: 800
    });

  }, (err) => {
    console.log("GPS error:", err);
  }, {
    enableHighAccuracy: true
  });

});
</script>
<script>
// ===== 🛣️ 道路名稱自動偵測（Reverse Geocoding） =====
async function updateRoadName(lng, lat){
  try{
    const R = 6371e3;
    const toRad = Math.PI / 180;

    function getDistance(lat1, lon1, lat2, lon2){
      const dLat = (lat2 - lat1) * toRad;
      const dLon = (lon2 - lon1) * toRad;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toRad)*Math.cos(lat2*toRad)*Math.sin(dLon/2)**2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    const query = `
    [out:json];
    way(around:80,${lat},${lng})["highway"]["name"];
    out center;
    `;

    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: query
    });

    const data = await res.json();

    let best = "未知道路";
    let min = Infinity;

    if(data.elements){
      for(const el of data.elements){
        if(!el.center || !el.tags?.name) continue;

        const d = getDistance(lat, lng, el.center.lat, el.center.lon);

        if(d < min){
          min = d;
          best = el.tags.name;
        }
      }
    }

    const label = document.getElementById("roadLabel");
    if(label) label.innerText = best;

  }catch(e){
    console.log("road name error", e);
  }
}
</script>
