<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Navigation Map</title>
<style>
/* ===== OpenStreetMap Layer ===== */
#map{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
} 

/* UI must be above map */
.rect2,.bottomBar,.rect4{
  z-index:2;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#C5DCF0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

.bottomBar{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:166px;
}

.rect1{
  box-sizing:border-box;
  position:absolute;
  left:8px;
  right:8px;
  top:0;
  height:166px;
  border-width:1.5px 1.5px 0 1.5px;
  border-style:solid;
  border-color:#FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);
  border-radius:11px 11px 0 0;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.rect3{
  position:absolute;
  width:46px;
  height:4px;
  left:50%;
  top:5px;
  transform:translateX(-50%);
  background:#74767A;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);
  border-radius:2.5px;
}

.info{
  position:absolute;
  left:50%;
  top:11px;
  transform:translateX(-50%);
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:20px;
  color:#000000;
  white-space:nowrap;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}

.rect4{
  box-sizing:border-box;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:176px;
  width:auto;
  max-width:calc(100% - 16px);
  height:33px;
  padding:0 13px;
  background:#FFFFFF;
  border:1.5px solid #FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  border-radius:16.5px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0px;
  z-index:5;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.rect4-inner{
  display:flex;
  align-items:center;
}

.rect4 .label{
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:16px;
  color:#000000;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.rect4 .icon{
  width:20px;
  height:20px;
  background:url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/TWHW3.svg/120px-TWHW3.svg.png') center/cover no-repeat;
  filter:drop-shadow(0px 4px 4px rgba(0,0,0,0.25));
  display:none;
  margin-left:6px;
}

.rect8{
  position:absolute;
  width:calc(100% - 16px);
  height:69px;
  left:8px;
  top:54px;
  background:#0E1A2D;
  border-radius:12px;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  z-index:5;
  display:flex;
  align-items:center;
  padding:0 18px;
  gap:14px;
  box-sizing:border-box;
}
.rect8Icon{
  font-size:30px;
  color:#FFFFFF;
  line-height:1;
  width:36px;
  text-align:center;
  flex-shrink:0;
}
.rect8TextWrap{
  flex:1;
  min-width:0;
}
.rect8Distance{
  color:#9FB3D1;
  font-size:12px;
  margin-bottom:2px;
}
.rect8Instruction{
  color:#FFFFFF;
  font-size:16px;
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ===== 🔍 搜尋地點 ===== */
.searchBarWrap{
  position:absolute;
  left:8px;
  right:8px;
  top:50px;
  z-index:5;
}
.searchBar{
  display:flex;
  align-items:center;
  background:#FFFFFF;
  border-radius:24px;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  padding:0 8px 0 16px;
  height:48px;
}
.searchBar input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  font-size:15px;
  font-family:inherit;
  color:#000;
}
.searchBar input::placeholder{ color:#999; }
.searchIconBtn{
  border:none;
  background:transparent;
  font-size:18px;
  width:36px;
  height:36px;
  border-radius:50%;
  cursor:pointer;
}
.searchResultsList{
  margin-top:8px;
  background:#FFFFFF;
  border-radius:14px;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  max-height:260px;
  overflow-y:auto;
  display:none;
}
.searchResultItem{
  padding:10px 14px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}
.searchResultItem:last-child{ border-bottom:none; }
.searchResultItem:active{ background:#f2f2f2; }
.searchResultItem .name{
  font-weight:700;
  font-size:14px;
  color:#000;
}
.searchResultItem .addr{
  font-size:12px;
  color:#666;
  margin-top:2px;
}
.searchResultsEmpty{
  padding:14px;
  font-size:13px;
  color:#888;
  text-align:center;
}

/* ===== 📍 選定地點後的導航面板 ===== */
.destPanel{
  position:absolute;
  left:8px;
  right:8px;
  bottom:180px;
  z-index:5;
  background:#FFFFFF;
  border-radius:14px;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  padding:12px 14px;
  display:none;
}
.destName{
  font-weight:700;
  font-size:15px;
  color:#000;
}
.destAddr{
  font-size:12px;
  color:#666;
  margin:4px 0 10px;
}
.destButtons{
  display:flex;
  gap:8px;
}
.navigateBtn{
  flex:1;
  background:#2F80FF;
  color:#FFFFFF;
  border:none;
  border-radius:10px;
  padding:11px 0;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
}
.closeDestBtn{
  background:#EEEEEE;
  color:#333;
  border:none;
  border-radius:10px;
  padding:11px 16px;
  font-size:14px;
  cursor:pointer;
}

.rect6{
  position:absolute;
  width:76px;
  height:76px;
  left:8px;
  top:132px;
  background:#FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  border-radius:38px;

  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction: column;

  font-size:24px;
  font-weight:400;
  color:#000000;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

.rect6 .speed-value {
  font-size: 32px;
  font-weight: 600;
}

.rect6 .speed-unit {
  font-size: 12px;
  font-weight: 400;
}

/* ===== 🆕 底部面板大改版新增元件 ===== */
.arrivalText{
  position:absolute;
  left:50%;
  top:35px;
  transform:translateX(-50%);
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:20px;
  color:#404345;
  white-space:nowrap;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}

.navExitBtn,.navOverviewBtn{
  position:absolute;
  top:40px;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:13px;
  color:#000000;
  background:none;
  border:none;
  padding:6px;
  cursor:pointer;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}

.navExitBtn{ left:6px; }
.navOverviewBtn{ right:6px; }

.navInfoCard{
  box-sizing:border-box;
  position:absolute;
  left:4px;
  right:4px;
  top:69px;
  height:60px;
  background:#FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  border-radius:8px;
  display:flex;
  align-items:center;
  overflow:hidden;
}

.navInfoCardIcon{
  width:59px;
  height:60px;
  flex-shrink:0;
  background:url('https://upload.wikimedia.org/wikipedia/zh/thumb/d/d1/ROC_Police_Broadcasting_Service_Seal.svg/1280px-ROC_Police_Broadcasting_Service_Seal.svg.png') center/contain no-repeat #FFFFFF;
  border-radius:8px;
  filter:drop-shadow(0px 4px 4px rgba(0,0,0,0.25));
}

.navInfoCardText{
  margin-left:12px;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:14px;
  color:#000000;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}


/* ===== 📷 CCTV 即時影像 ===== */
/* ===== 📷 CCTV 即時影像:置中大尺寸彈出視窗 ===== */
.cctvOverlay{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:88%;
  max-width:640px;
  padding:14px;
  box-sizing:border-box;
  background:rgba(14,26,45,0.95);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 12px 40px rgba(0,0,0,0.45);
  border-radius:14px;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  z-index:50;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  display:none;
}

.cctvOverlay.show{
  display:block;
}

.cctvPanelTitle{
  font-size:18px;
  font-weight:700;
  color:#FFFFFF;
  margin-bottom:10px;
  padding-right:36px;
  cursor:move;
  user-select:none;
}

.cctvImage{
  width:100%;
  border-radius:8px;
  display:block;
  background:#000000;
}

.cctvStatus{
  margin-top:10px;
  color:#B9C2D0;
  font-size:13px;
  line-height:17px;
}

.cctvCloseBtn{
  position:absolute;
  top:10px;
  right:10px;
  width:30px;
  height:30px;
  border:0;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
  color:#FFFFFF;
  font-size:18px;
  line-height:30px;
  text-align:center;
  cursor:pointer;
}

.cctvCloseBtn:active{
  background:rgba(255,255,255,0.25);
}

.maplibregl-marker img{
  width:40px !important;
  height:auto !important;
  object-fit:contain;
  display:block;
}

.maplibregl-user-location-dot{
  background-color:#1E90FF !important;
  width:14px !important;
  height:14px !important;
  border-radius:50%;
  border:2px solid #ffffff !important;
  box-shadow:0 0 0 6px rgba(30,144,255,0.25);
}

.maplibregl-user-location-accuracy-circle{
  fill:rgba(30,144,255,0.15) !important;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  touch-action: none;
}
</style>
</head>

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<script>
let userMarker = null;

function updateUserLocation(position) {
  const lng = position.coords.longitude;
  const lat = position.coords.latitude;

  window.currentLat = lat; // 讓搜尋導航功能盡早就能取得目前位置
  window.currentLon = lng;

  const el = document.createElement('div');
  el.style.width = '16px';
  el.style.height = '16px';
  el.style.borderRadius = '50%';
  el.style.background = '#2F80FF';
  el.style.border = '3px solid white';
  el.style.boxShadow = '0 0 10px rgba(47,128,255,0.6)';

  if (userMarker) userMarker.remove();

  userMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat([lng, lat])
    .addTo(map);

  map.easeTo({ center: [lng, lat], zoom: 16, padding: getUserCameraPadding(), bearing: (window.compassHeading != null ? window.compassHeading : 0) });
}

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(updateUserLocation);
}
</script>
<script src="https://unpkg.com/@maplibre/maplibre-gl-geocoder/dist/maplibre-gl-geocoder.min.js"></script>
<script>
  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: [121.394, 24.951],
    zoom: 16,
    pitch: 60,
    bearing: -20,
    antialias: true
  });

  map.on('load', () => {
    map.dragRotate.enable();
    map.touchZoomRotate.enableRotation();
    map.boxZoom.disable();
    map.scrollZoom.enable();
    map.dragPan.enable();
  });

  map.on('load',()=>{

const geolocate = new maplibregl.GeolocateControl({
  positionOptions: {
    enableHighAccuracy: true
  },
  trackUserLocation: true,
  showUserHeading: true
});

map.addControl(geolocate);
geolocate.trigger();
    const layers = map.getStyle().layers;
    let labelLayerId;

    for (let i = 0; i < layers.length; i++) {
      if (layers[i].type === 'symbol') {
        labelLayerId = layers[i].id;
        break;
      }
    }

    map.addLayer(
      {
        id: '3d-buildings',
        source: 'openmaptiles',
        'source-layer': 'building',
        type: 'fill-extrusion',
        minzoom: 15,
        paint: {
        'fill-extrusion-height': 0.1,
        'fill-extrusion-base': 0,
          'fill-extrusion-color': '#aaa',
          'fill-extrusion-height': [
            'interpolate',
            ['linear'],
            ['zoom'],
            15,
            0,
            15.05,
            ['get', 'height']
          ],
          'fill-extrusion-base': [
            'interpolate',
            ['linear'],
            ['zoom'],
            15,
            0,
            15.05,
            ['get', 'min_height']
          ],
          'fill-extrusion-opacity': 0.8
        }
      },
      labelLayerId
    );
  });
  map.addControl(new maplibregl.NavigationControl());


  const infoElement = document.querySelector('.info');
  const rect6SpeedValue = document.querySelector('.rect6 .speed-value');
  const rect6SpeedUnit = document.querySelector('.rect6 .speed-unit');
  
  let startTime = null;
  let lastPosition = null;
  let totalDistance = 0;
  let routeCoordinates = [];
  let marker = null;
  let routeSource = null;

  // ===== 🆕 退出 / 全覽 按鈕 =====
  const navExitBtn = document.getElementById('navExitBtn');
  const navOverviewBtn = document.getElementById('navOverviewBtn');

  if(navExitBtn){
    navExitBtn.addEventListener('click', () => {
      if(confirm('要結束本次路線記錄並重新開始嗎?')){
        location.reload();
      }
    });
  }

  if(navOverviewBtn){
    navOverviewBtn.addEventListener('click', () => {
      // 優先顯示規劃中的真實導航路線,沒有規劃路線時才退回GPS軌跡記錄
      const planned = window.plannedRouteCoordinates;
      if (planned && planned.length >= 2) {
        const lons = planned.map(c => c[0]);
        const lats = planned.map(c => c[1]);
        const bounds = [
          [Math.min(...lons), Math.min(...lats)],
          [Math.max(...lons), Math.max(...lats)]
        ];
        map.fitBounds(bounds, { padding: 80, duration: 800 });
        return;
      }

      if(routeCoordinates.length < 2){
        // 還沒有足夠的路線資料,直接把目前位置縮小看一下週邊
        if(routeCoordinates.length === 1){
          map.easeTo({ center: routeCoordinates[0], zoom: 13 });
        }
        return;
      }
      const lons = routeCoordinates.map(c => c[0]);
      const lats = routeCoordinates.map(c => c[1]);
      const bounds = [
        [Math.min(...lons), Math.min(...lats)],
        [Math.max(...lons), Math.max(...lats)]
      ];
      map.fitBounds(bounds, { padding: 80, duration: 800 });
    });
  }

  map.on('load', () => {
    map.addSource('route', {
      type: 'geojson',
      data: {
        type: 'FeatureCollection',
        features: []
      }
    });

    map.addLayer({
      id: 'route',
      type: 'fill-extrusion',
      source: 'route',
      paint: {
        'fill-extrusion-color': '#888888',
        'fill-extrusion-height': 0.1,
        'fill-extrusion-base': 0,
        'fill-extrusion-opacity': 1
      }
    });

    window.buildCctvLabel = function(cam){

      el.addEventListener('click', () => {
        // 手動點擊圖示(isAuto = false),跟定位自動觸發(isAuto = true)分開標記
        window.switchCctvCamera(url, label, cam.id, false);

  function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = 
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  // ===== 📷 定位經過監視器附近時自動顯示 =====
  const CCTV_AUTO_SHOW_RADIUS_KM = 0.1; // 100 公尺內視為「經過」

  function checkCctvProximity(lat, lon){
    const cameras = window.cctvCameras;
    if(!cameras || !cameras.length) return;

    // 找出範圍內最近的一支監視器
    let nearest = null;
    let nearestDist = Infinity;
    for(let i = 0; i < cameras.length; i++){
      const cam = cameras[i];
      if (cam.hidden) continue; // 座標有問題的監視器,不參與定位接近偵測
      const d = calculateDistance(lat, lon, cam.lat, cam.lon);
      if(d <= CCTV_AUTO_SHOW_RADIUS_KM && d < nearestDist){
        nearest = cam;
        nearestDist = d;
      }
    }

    if(nearest){
      // 範圍內有監視器,且還沒顯示這一支的畫面,就自動切換過去
      if(window.cctvActiveCameraId !== nearest.id){
        const label = window.buildCctvLabel ? window.buildCctvLabel(nearest) : (nearest.road + " " + nearest.mile);
        window.switchCctvCamera(nearest.url, label, nearest.id, true);
      }
    } else {
      // 範圍外:如果目前顯示的是「自動觸發」開的,就自動關閉;手動點開的維持不動
      if(window.cctvActiveCameraId && window.cctvActiveIsAuto){
        window.closeCctvOverlay();
      }
    }
  }

  function speakText(text){
    if (!('speechSynthesis' in window)) return;
    try {
      window.speechSynthesis.cancel(); // 避免播報堆疊、搶話
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'zh-TW';
      utter.rate = 1.00;
      window.speechSynthesis.speak(utter);
    } catch(e) {
      console.error('語音播報失敗:', e);
    }
  }

  // 分段播放,段落之間用setTimeout插入真正1秒的靜音停頓,不依賴標點符號
  function speakSegments(segments){
    if (!('speechSynthesis' in window)) return;
    const list = segments.filter(s => s && s.length > 0);
    if (!list.length) return;

    window.speechSynthesis.cancel(); // 避免播報堆疊、搶話

    function playAt(i){
      if (i >= list.length) return;
      const utter = new SpeechSynthesisUtterance(list[i]);
      utter.lang = 'zh-TW';
      utter.rate = 1.00;
      utter.onend = () => {
        if (i + 1 < list.length) {
          setTimeout(() => playAt(i + 1), 250); // 真正的0.25秒停頓
        }
      };
      window.speechSynthesis.speak(utter);
    }
    playAt(0);
  }

  async function searchPlaces(query){
    if (!query || !query.trim()) return;
    searchResultsList.innerHTML = '<div class="searchResultsEmpty">搜尋中...</div>';
    searchResultsList.style.display = 'block';
    try {
      const url = 'https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&limit=8&countrycodes=tw&accept-language=zh-TW&q=' + encodeURIComponent(query);
      const res = await fetch(url);
      const list = await res.json();
      renderSearchResults(list);
    } catch (e) {
      console.error('搜尋地點失敗:', e);
      searchResultsList.innerHTML = '<div class="searchResultsEmpty">搜尋失敗,請檢查網路連線</div>';
    }
  }

  function renderSearchResults(list){
    if (!list || !list.length) {
      searchResultsList.innerHTML = '<div class="searchResultsEmpty">找不到符合的地點</div>';
      return;
    }
    searchResultsList.innerHTML = '';
    list.forEach(item => {
      const el = document.createElement('div');
      el.className = 'searchResultItem';
      const mainName = (item.display_name || '').split(',')[0];
      el.innerHTML = '<div class="name">' + mainName + '</div><div class="addr">' + (item.display_name || '') + '</div>';
      el.addEventListener('click', () => {
        selectDestination(parseFloat(item.lat), parseFloat(item.lon), mainName, item.display_name);
      });
      searchResultsList.appendChild(el);
    });
  }

    searchResultsList.style.display = 'none';

  const navStepVoiceState = {}; // key: 步驟索引, value: idle/warned200/warned30

  const rect8 = document.getElementById('rect8');
  const rect8Icon = document.getElementById('rect8Icon');
  const rect8Instruction = document.getElementById('rect8Instruction');
  const rect8Distance = document.getElementById('rect8Distance');
  const searchBarWrapEl = document.getElementById('searchBarWrap');

  // 把OSRM的英文轉彎類型/修飾詞,轉成中文播報用文字
  function bindTurnByTurnTestButton(){
    const btn = document.getElementById('turnByTurnTestBtn');
    if (btn) {
      btn.addEventListener('click', () => {
        if (typeof window.testTurnByTurnVoice === 'function') {
          window.testTurnByTurnVoice();
        }
      });
    }
  }

  function maneuverToChinese(maneuver){
    const modMap = {
      'left':'左轉','right':'右轉',
      'slight left':'靠左行駛','slight right':'靠右行駛',
      'sharp left':'大幅左轉','sharp right':'大幅右轉',
      'straight':'直行','uturn':'迴轉'
    };
    if (maneuver.type === 'depart') return '出發';
    if (maneuver.type === 'arrive') return '即將到達目的地';
    if (maneuver.type === 'roundabout' || maneuver.type === 'rotary') return '進入圓環';
    if (maneuver.type === 'merge') return '匯入車流';
    if (maneuver.type === 'fork') return '請靠' + (maneuver.modifier && maneuver.modifier.includes('left') ? '左' : '右') + '行駛';
    if (maneuver.type === 'end of road') return '路底' + (maneuver.modifier && modMap[maneuver.modifier] ? modMap[maneuver.modifier] : '轉彎');
    if (maneuver.type === 'continue' || maneuver.type === 'new name') return '繼續直行';
    if (maneuver.modifier && modMap[maneuver.modifier]) return modMap[maneuver.modifier];
    return '繼續前進';
  }

  // 轉彎方向對應的箭頭圖示
  function iconForManeuver(maneuver){
    if (maneuver.type === 'depart') return '🚗';
    if (maneuver.type === 'arrive') return '🏁';
    const mod = maneuver.modifier || '';
    if (mod.includes('sharp left')) return '↰';
    if (mod.includes('sharp right')) return '↱';
    if (mod.includes('left')) return '↖';
    if (mod.includes('right')) return '↗';
    if (mod === 'uturn') return '↩';
    return '↑';
  }

  // 更新Rectangle 8畫面顯示(圖示+距離+轉彎指示文字)
  function updateRect8Display(distanceMeters){
    if (!rect8 || !navSteps.length || currentStepIndex >= navSteps.length) return;
    const step = navSteps[currentStepIndex];
    if (!step) return;
    const text = maneuverToChinese(step.maneuver);
    const roadName = step.name ? ('進入' + step.name) : '';
    if (rect8Instruction) rect8Instruction.innerText = text + (roadName ? roadName : '');
    if (rect8Icon) rect8Icon.innerText = iconForManeuver(step.maneuver);
    if (rect8Distance) {
      rect8Distance.innerText = (distanceMeters != null) ? (Math.round(distanceMeters) + '公尺後') : '';
    }
  }

  // GPS每次更新時呼叫:算出離下一個轉彎點多遠,更新畫面跟語音播報
  function checkTurnByTurn(lat, lon){
    if (!isNavigating || !navSteps.length) return;
    if (currentStepIndex >= navSteps.length) {
      isNavigating = false;
      return;
    }
    const step = navSteps[currentStepIndex];
    const loc = step.maneuver.location; // [lon, lat]
    const meters = calculateDistance(lat, lon, loc[1], loc[0]) * 1000;
    const isDepart = (step.maneuver.type === 'depart');

    updateRect8Display(meters);

    const state = navStepVoiceState[currentStepIndex] || 'idle';
    const text = maneuverToChinese(step.maneuver);
    const roadPart = step.name ? ('進入' + step.name) : '';

    console.log('[轉彎導航] 第' + currentStepIndex + '步,距離' + Math.round(meters) + '公尺,狀態:' + state + ',指示:' + text);

    // 由近到遠檢查(順序很重要),避免GPS更新間隔太大時整個跳過播報門檻
    if (meters <= 15) {
      // 出發點本身不用播報,直接靜默前進到第一個真正的轉彎
      if (!isDepart && state !== 'warned30' && state !== 'passed') {
        speakText('請' + text + roadPart);
      }
      currentStepIndex++;
      navStepVoiceState[currentStepIndex] = navStepVoiceState[currentStepIndex] || 'idle';
      if (currentStepIndex >= navSteps.length) {
        isNavigating = false;
        if (rect8) rect8.style.display = 'none';
        if (searchBarWrapEl) searchBarWrapEl.style.display = '';
        speakText('您已到達目的地');
      } else {
        updateRect8Display();
      }
    } else if (meters <= 30 && !isDepart && state !== 'warned30') {
      speakText('請' + text + roadPart);
      navStepVoiceState[currentStepIndex] = 'warned30';
    } else if (meters <= 200 && !isDepart && state === 'idle') {
      speakText('前方' + (Math.max(10, Math.round(meters / 10) * 10)) + '公尺' + text + roadPart);
      navStepVoiceState[currentStepIndex] = 'warned200';
    }
  }

  // ===== 🧪 測試用:不用真的開車,直接在主控台或測試面板模擬播報 =====
  window.testTurnByTurnVoice = function(){
    if (!navSteps.length) {
      // 還沒有規劃路線時,先用假資料測試語音機制本身有沒有作用
      speakText('前方一百公尺,請左轉,進入測試路');
      console.log('[轉彎語音測試] 目前沒有規劃中的路線,改用假資料測試語音機制本身');
      return;
    }
    const step = navSteps[Math.min(1, navSteps.length - 1)]; // 抓第一個真正的轉彎(跳過出發點)
    const text = maneuverToChinese(step.maneuver);
    const roadPart = step.name ? ('進入' + step.name) : '';
    speakText('前方100公尺' + text + roadPart);
  };
  bindTurnByTurnTestButton();


  // 螢幕高度算出來的鏡頭偏移,讓定位點顯示在畫面中下方、Rectangle 4正上方,而不是螢幕正中央
  function getUserCameraPadding(){
    const H = window.innerHeight || 800;
    const OFFSET_FROM_BOTTOM = 240; // rect4頂端距螢幕底部約209px,這裡抓240px留一點間距
    const T = Math.max(0, H - 2 * OFFSET_FROM_BOTTOM);
    return { top: T, bottom: 0, left: 0, right: 0 };
  }

  // ===== 🧭 手機羅盤方向偵測,讓地圖跟著手機旋轉(360度)而不是固定北方朝上 =====
  window.compassHeading = null;

  function handleDeviceOrientation(event){
    let heading = null;
    if (typeof event.webkitCompassHeading === 'number') {
      heading = event.webkitCompassHeading; // iOS Safari,已經是指北的角度
    } else if (typeof event.alpha === 'number') {
      heading = 360 - event.alpha; // Android,alpha是逆時針從北方算起,轉換成順時針
    }
    if (heading != null && !isNaN(heading)) {
      window.compassHeading = heading;
    }
  }

  function requestOrientationPermission(){
    if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
      // iOS 13+ 需要使用者手勢觸發才能要求羅盤權限
      DeviceOrientationEvent.requestPermission().then(state => {
        if (state === 'granted') {
          window.addEventListener('deviceorientationabsolute', handleDeviceOrientation, true);
          window.addEventListener('deviceorientation', handleDeviceOrientation, true);
        }
      }).catch(() => {});
    } else {
      window.addEventListener('deviceorientationabsolute', handleDeviceOrientation, true);
      window.addEventListener('deviceorientation', handleDeviceOrientation, true);
    }
  }
  document.addEventListener('click', requestOrientationPermission, { once: true });
  document.addEventListener('touchstart', requestOrientationPermission, { once: true });


  function getCurrentPositionPromise(){
    // 優先用已經在追蹤的GPS座標(window.currentLat/Lon),沒有的話現抓一次
    if (window.currentLat != null && window.currentLon != null) {
      return Promise.resolve({ lat: window.currentLat, lon: window.currentLon });
    }
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) { reject(new Error('瀏覽器不支援定位')); return; }
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
        (err) => reject(err)
      );
    });
  }

  async function planRouteTo(destLat, destLon){
    let origin;
    try {
      origin = await getCurrentPositionPromise();
    } catch (e) {
      alert('無法取得目前位置,請確認已允許定位權限');
      return;
    }

    navigateBtn.disabled = true;
    navigateBtn.innerText = '規劃路線中...';

    try {
      const url = 'https://router.project-osrm.org/route/v1/driving/' +
        origin.lon + ',' + origin.lat + ';' + destLon + ',' + destLat +
        '?overview=full&geometries=geojson&steps=true';
      const res = await fetch(url);
      const data = await res.json();

      if (!data.routes || !data.routes.length) {
        alert('找不到可行的路線');
        return;
      }

      const route = data.routes[0];
      plannedRouteCoordinates = route.geometry.coordinates;
      window.plannedRouteCoordinates = plannedRouteCoordinates;

      if (window.navRouteSource) {
        window.navRouteSource.setData({
          type: 'FeatureCollection',
          features: [{ type: 'Feature', geometry: route.geometry }]
        });
      }

      // 更新底部面板的時間/距離/到達時間顯示
      const durationMin = Math.round(route.duration / 60);
      const distanceKm = (route.distance / 1000).toFixed(1);
      const infoEl = document.querySelector('.info');
      if (infoEl) {
        const h = Math.floor(durationMin / 60);
        const m = durationMin % 60;
        infoEl.innerText = (h > 0 ? h + '小時' : '') + m + '分鐘 ' + distanceKm + '公里';
      }
      const arrivalEl = document.getElementById('arrivalText');
      if (arrivalEl) {
        const eta = new Date(Date.now() + route.duration * 1000);
        const hh = String(eta.getHours()).padStart(2, '0');
        const mm = String(eta.getMinutes()).padStart(2, '0');
        arrivalEl.innerText = hh + ':' + mm + '到達';
      }

      // 縮放地圖顯示整條路線
      const lons = plannedRouteCoordinates.map(c => c[0]);
      const lats = plannedRouteCoordinates.map(c => c[1]);
      const bounds = [
        [Math.min(...lons), Math.min(...lats)],
        [Math.max(...lons), Math.max(...lats)]
      ];
      map.fitBounds(bounds, { padding: 80, duration: 800 });

      destPanel.style.display = 'none';

      // ===== 🧭 啟動逐步轉彎導航模式 =====
      navSteps = (route.legs && route.legs[0] && route.legs[0].steps) ? route.legs[0].steps : [];
      currentStepIndex = 0;
      Object.keys(navStepVoiceState).forEach(k => delete navStepVoiceState[k]);
      isNavigating = true;
      if (searchBarWrapEl) searchBarWrapEl.style.display = 'none';
      if (rect8) rect8.style.display = 'flex';
      updateRect8Display();

      // 開始導航時播報全程距離跟預估時間,並直接帶出第一個轉彎指示(不用等GPS靠近才講)
      const startH = Math.floor(durationMin / 60);
      const startM = durationMin % 60;
      let startupText = '開始導航,全程' + distanceKm + '公里,大約需要';
      if (startH > 0) startupText += startH + '小時';
      startupText += startM + '分鐘';

      // 加上預計到達時間
      const startupEta = new Date(Date.now() + route.duration * 1000);
      const startupEtaH = startupEta.getHours();
      const startupEtaM = startupEta.getMinutes();
      startupText += ',預計' + startupEtaH + '點' + startupEtaM + '分到達';

      // 找出第一個真正的轉彎(跳過出發點depart),把指示一併講出來
      const firstTurnIndex = navSteps.findIndex(s => s.maneuver && s.maneuver.type !== 'depart');
      if (firstTurnIndex !== -1) {
        const firstStep = navSteps[firstTurnIndex];
        const firstText = maneuverToChinese(firstStep.maneuver);
        const firstRoadPart = firstStep.name ? ('進入' + firstStep.name) : '';
        // 用上一步(通常是出發點)的距離,算出離第一個轉彎還有多遠
        const prevStep = navSteps[firstTurnIndex - 1];
        const firstStepDistanceMeters = prevStep ? prevStep.distance : null;
        if (firstStepDistanceMeters != null) {
          const meters = Math.max(10, Math.round(firstStepDistanceMeters / 10) * 10);
          startupText += ',前方' + meters + '公尺' + firstText + firstRoadPart;
        } else {
          startupText += ',' + firstText + firstRoadPart;
        }
        // 標記這一步已經播報過,避免GPS之後在200公尺/30公尺門檻又重複講一次
        currentStepIndex = firstTurnIndex;
        navStepVoiceState[firstTurnIndex] = 'warned200';
        updateRect8Display(firstStepDistanceMeters);
      }

      speakText(startupText);

      // 先讓使用者看一眼整條路線的鳥瞰圖,1.8秒後自動拉近到正常導航視角,不然會一直停在縮小狀態看不清楚路
      setTimeout(() => {
        if (!isNavigating) return; // 如果這段時間使用者已經退出導航,就不要再拉近
        map.easeTo({
          center: [origin.lon, origin.lat],
          zoom: 17,
          duration: 1200,
          padding: getUserCameraPadding(),
          bearing: (window.compassHeading != null ? window.compassHeading : 0)
        });
      }, 1800);
    } catch (e) {
      console.error('路線規劃失敗:', e);
      alert('路線規劃失敗,請檢查網路連線');
    } finally {
      navigateBtn.disabled = false;
      navigateBtn.innerText = '開始導航';
    }
  }

  if (navigateBtn) {
    navigateBtn.addEventListener('click', () => {
      if (!selectedDest) return;
      planRouteTo(selectedDest.lat, selectedDest.lon);
    });
  }

  // 全覽按鈕也要考慮目前是否有規劃中的真實導航路線(優先顯示這個,而不是GPS軌跡)
  window.plannedRouteCoordinates = plannedRouteCoordinates;

  function checkSpeedCameraVoice(lat, lon, currentSpeedKmh){
    const data = window.speedCameraData;
    if (!data || !data.features) return;

    data.features.forEach((f, idx) => {
      const [camLon, camLat] = f.geometry.coordinates;
      const p = f.properties;
      const d = calculateDistance(lat, lon, camLat, camLon); // 公里

      const state = speedCameraVoiceState[idx] || 'idle';

      if (d <= SPEED_CAM_WARN_KM && state === 'idle') {
        // 進入100公尺範圍,第一次播報預告(距離用實際算出來的,不是寫死100)
        const limit = p.limit;
        const meters = Math.max(10, Math.round((d * 1000) / 10) * 10); // 四捨五入到最近10公尺,且最少講10公尺
        const isOverSpeed = !!(currentSpeedKmh && limit && currentSpeedKmh > Number(limit));
        let text = '前方' + meters + '公尺後有固定測速照相';
        if (limit) text += '限速' + limit + '公里';
        if (isOverSpeed) text += '您已超速';
        speakText(text);
        speedCameraVoiceState[idx] = 'warned';

      } else if (d <= SPEED_CAM_PASS_KM && state === 'warned') {
        // 已經很靠近,視為通過,播報一次「通過」
        speakText('通過測速照相');
        speedCameraVoiceState[idx] = 'passed';

      } else if (d > SPEED_CAM_RESET_KM && state !== 'idle') {
        // 離開範圍夠遠,重置狀態,讓之後再經過同一支時還能再播報
        speedCameraVoiceState[idx] = 'idle';
      }
    });
  }

  // ===== 🧪 測試用:在瀏覽器主控台手動模擬,不用真的開車過去 =====
  // 用法範例(在 Console 貼上執行):
  //   window.testSpeedCameraVoice(24.778543, 121.75933, 70)
  //   參數:緯度, 經度, 模擬車速(km/h)
  window.testSpeedCameraVoice = function(lat, lon, speedKmh){
    checkSpeedCameraVoice(lat, lon, speedKmh || 0);
  };
  // 重置所有測速照相的播報狀態,方便重複測試同一支
  window.resetSpeedCameraVoiceState = function(){
    Object.keys(speedCameraVoiceState).forEach(k => delete speedCameraVoiceState[k]);
    console.log('已重置所有測速照相播報狀態');
  };
  // 直接測試語音功能本身有沒有作用(不牽涉座標距離判斷)
  window.testSpeak = function(text){
    speakText(text || '測試語音播報');
  };

  // ===== 🧪 固定用速限100的測速照相做測試,不管距離直接播報 =====
  // 注意:不要在這裡用 const 提前抓資料,因為這段程式碼可能比
  // window.speedCameraData 設定完成的時間點還早執行,提前抓只會抓到空值。
  // 改成每次需要時才即時查找。
  function getTestCamera(){
    const data = window.speedCameraData;
    if (!data || !data.features || !data.features.length) return null;
    // 優先找速限100的測速點,找不到就退回第一支
    const found = data.features.find(f => f.properties && f.properties.limit === '100');
    return found || data.features[0];
  }

  function forceTestSpeedCameraAnnounce(speedKmh, distanceMeters){
    const cam = getTestCamera();
    if (!cam) {
      console.warn('找不到測速照相測試資料(window.speedCameraData尚未準備好)');
      return;
    }
    const p = cam.properties;
    const limit = p.limit;
    const meters = (distanceMeters !== undefined && distanceMeters !== null && distanceMeters !== '')
      ? Math.round(Number(distanceMeters))
      : 100;
    const isOverSpeed = !!(speedKmh && limit && Number(speedKmh) > Number(limit));
    let text = '前方' + meters + '公尺後有固定測速照相';
    if (limit) text += '限速' + limit + '公里';
    if (isOverSpeed) text += '您已超速';
    speakText(text);
  }
  window.forceTestSpeedCameraAnnounce = forceTestSpeedCameraAnnounce;

  // 把測試面板接上按鈕跟資訊顯示
  (function initSpeedCamTestPanel(){
    const infoEl = document.getElementById('speedCamTestInfo');
    const speedInput = document.getElementById('speedCamTestSpeed');
    const distanceInput = document.getElementById('speedCamTestDistance');
    const useRealSpeedBtn = document.getElementById('speedCamUseRealSpeedBtn');
    const btn = document.getElementById('speedCamTestBtn');

    // 資料可能還沒準備好,定期重試更新顯示文字,抓到之後就停止重試
    function updateInfoText(){
      if (!infoEl) return false;
      const cam = getTestCamera();
      if (cam) {
        const p = cam.properties;
        infoEl.innerText = (p.address || '測試點') + '(速限' + (p.limit || '?') + ')';
        return true;
      } else {
        infoEl.innerText = '資料載入中...';
        return false;
      }
    }

    if (!updateInfoText()) {
      const retryTimer = setInterval(() => {
        if (updateInfoText()) clearInterval(retryTimer);
      }, 500);
    }

    if (btn) {
      btn.addEventListener('click', () => {
        const speedKmh = speedInput ? Number(speedInput.value) : 0;
        const distanceMeters = distanceInput ? Number(distanceInput.value) : 100;
        forceTestSpeedCameraAnnounce(speedKmh, distanceMeters);
      });
    }

    if (useRealSpeedBtn) {
      useRealSpeedBtn.addEventListener('click', () => {
        const real = window.currentSpeedKmh;
        if (real === undefined || real === null) {
          alert('還沒有取得GPS車速,請先確認定位已經開始');
          return;
        }
        if (speedInput) speedInput.value = Math.round(real);
      });
    }
  })();



  function formatTime(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    return `${hours}小時${minutes}分鐘`;
  }

  function updateDisplay(speed, elapsedMs) {
    rect6SpeedValue.innerText = Math.round(speed);
    // 導航中(已經規劃好真實路線)時,.info要顯示「全程距離/時間」,
    // 不能被這裡的GPS行程記錄(從0開始算)覆蓋掉
    if (!isNavigating) {
      infoElement.innerText = `${formatTime(elapsedMs)} ${totalDistance.toFixed(2)}公里`;
    }
  }

  // ===== 平滑移動定位點(用動畫插值,不要瞬間跳轉) =====
  let markerAnimFrame = null;
  let markerDisplayLngLat = null; // 目前畫面上實際顯示的位置(動畫的起點)

  function animateMarkerTo(targetLng, targetLat, duration){
    if(!marker) return;

    // 第一次還沒有起點位置時,直接定位過去,不需要動畫
    if(!markerDisplayLngLat){
      markerDisplayLngLat = [targetLng, targetLat];
      marker.setLngLat(markerDisplayLngLat);
      return;
    }

    const startLng = markerDisplayLngLat[0];
    const startLat = markerDisplayLngLat[1];
    const startTimeMs = performance.now();

    if(markerAnimFrame){
      cancelAnimationFrame(markerAnimFrame);
    }

    function step(){
      const elapsed = performance.now() - startTimeMs;
      const t = Math.min(1, elapsed / duration);
      // easeOutCubic,讓移動有自然的減速感,不會死板地等速移動
      const eased = 1 - Math.pow(1 - t, 3);

      const lng = startLng + (targetLng - startLng) * eased;
      const lat = startLat + (targetLat - startLat) * eased;

      markerDisplayLngLat = [lng, lat];
      marker.setLngLat(markerDisplayLngLat);

      if(t < 1){
        markerAnimFrame = requestAnimationFrame(step);
      }
    }

    markerAnimFrame = requestAnimationFrame(step);
  }

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition((pos) => {
      const now = Date.now();
      const currentLat = pos.coords.latitude;
      const currentLon = pos.coords.longitude;
      const currentSpeed = pos.coords.speed || 0;

      if (!startTime) {
        startTime = now;
        lastPosition = { lat: currentLat, lon: currentLon };
        routeCoordinates = [[currentLon, currentLat]];
      }

      if (lastPosition) {
        const distance = calculateDistance(lastPosition.lat, lastPosition.lon, currentLat, currentLon);
        totalDistance += distance;
        lastPosition = { lat: currentLat, lon: currentLon };
      }

      if (lastPosition) {
        const d = calculateDistance(lastPosition.lat, lastPosition.lon, currentLat, currentLon);
        if (d > 0.005) {
          routeCoordinates.push([currentLon, currentLat]);
        }
      }

      if (routeSource) {
        routeSource.setData({
          type: 'FeatureCollection',
          features: [{
            type: 'Feature',
            geometry: {
              type: 'LineString',
              coordinates: routeCoordinates
            }
          }]
        });
      }

      map.easeTo({
        center: [currentLon, currentLat],
        zoom: 15,
        duration: 1000,
        padding: getUserCameraPadding(),
        bearing: (window.compassHeading != null ? window.compassHeading : 0)
      });

      if (typeof checkTurnByTurn === 'function') {
        checkTurnByTurn(currentLat, currentLon);
      }

      if (!marker) {
        const el = document.createElement('div');
        el.style.width = '20px';
        el.style.height = '20px';
        el.style.backgroundColor = '#3b82f6';
        el.style.borderRadius = '50%';
        el.style.border = '2px solid white';
        el.style.boxShadow = '0 2px 4px rgba(0,0,0,0.3)';

        marker = new maplibregl.Marker(el).setLngLat([currentLon, currentLat]).addTo(map);
        markerDisplayLngLat = [currentLon, currentLat];
      } else {
        // 用 1 秒的平滑動畫移動過去,而不是瞬間跳轉到新座標
        animateMarkerTo(currentLon, currentLat, 1000);
      }

      const elapsedMs = now - startTime;
      const speedKmh = currentSpeed * 3.6;
      window.currentSpeedKmh = speedKmh; // 讓測試面板可以讀取目前真實車速
      window.currentLat = currentLat; // 讓搜尋導航功能可以取得目前位置
      window.currentLon = currentLon;

      updateDisplay(speedKmh, elapsedMs);
      requestRoadNameUpdate(currentLon, currentLat);

      // 定位經過監視器附近時自動顯示彈出視窗
      checkCctvProximity(currentLat, currentLon);

      // 測速照相語音播報(接近100公尺預告、超速警示、通過播報)
      checkSpeedCameraVoice(currentLat, currentLon, speedKmh);

    }, (err) => {
      console.error('GPS error:', err);
      rect6SpeedValue.innerText = '×';
      rect6SpeedUnit.innerText = 'GPS';
    }, {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 10000
    });
  } else {
    alert('您的瀏覽器不支援地理定位功能');
  }
</script>

    return new maplibregl.Marker({

    }).setLngLat([lng, lat]);
  }

  navigator.geolocation.watchPosition((pos) => {
    const lng = pos.coords.longitude;

    if (userMarker) userMarker.remove();

    userMarker = createUserDot(lng, lat).addTo(map);

    map.easeTo({
      center: [lng, lat],

      padding: getUserCameraPadding(),

<script>
// ===== 🛣️ 道路名稱查詢節流控制 =====
// Overpass API 是公開免費服務,太頻繁查詢容易被限流/擋掉,
// 所以這裡限制「最快幾秒才能查一次」,而且同一時間只允許一個請求在跑。
const ROAD_NAME_MIN_INTERVAL_MS = 8000;
let roadNameLastFetchAt = 0;
let roadNameInFlight = false;
let roadNamePendingCoords = null;
let roadNameRequestSeq = 0;       // 用來判斷回應是不是過期的(避免舊請求晚回來蓋掉新結果)
let roadNameLatestAppliedSeq = 0;

function requestRoadNameUpdate(lng, lat){
  const now = Date.now();

  if(roadNameInFlight){
    // 已經有請求在跑,先記住最新位置,等目前這次查完再用最新的位置補查一次
    roadNamePendingCoords = [lng, lat];
    return;
  }

  if(now - roadNameLastFetchAt < ROAD_NAME_MIN_INTERVAL_MS){
    // 還沒到可以再查的時間,先記住最新位置,時間到了會自動補查
    roadNamePendingCoords = [lng, lat];
    return;
  }

  roadNamePendingCoords = null;
  roadNameLastFetchAt = now;
  roadNameInFlight = true;

  const mySeq = ++roadNameRequestSeq;

  updateRoadName(lng, lat, mySeq).finally(() => {
    roadNameInFlight = false;
    // 查詢期間如果定位又更新了,用最新的位置立刻補查一次
    if(roadNamePendingCoords){
      const [pLng, pLat] = roadNamePendingCoords;
      roadNamePendingCoords = null;
      requestRoadNameUpdate(pLng, pLat);
    }
  });
}

async function updateRoadName(lng, lat, seq){
  try{
    const R = 6371e3;
    const toRad = Math.PI / 180;

    function getDistance(lat1, lon1, lat2, lon2){
      const dLat = (lat2 - lat1) * toRad;
      const dLon = (lon2 - lon1) * toRad;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toRad)*Math.cos(lat2*toRad)*Math.sin(dLon/2)**2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    const query = `
    [out:json];
    way(around:10,${lat},${lng})["highway"]["name"];
    out center;
    `;

    // 加上逾時保護,避免Overpass反應太慢時卡住,一直占用「目前有請求在跑」的狀態
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 6000);

    let res;
    try{
      res = await fetch("https://overpass-api.de/api/interpreter", {
        method: "POST",
        body: query,
        signal: controller.signal
      });
    } finally {
      clearTimeout(timeoutId);
    }

    if(!res.ok){
      console.log("road name http error", res.status);
      return;
    }

    const data = await res.json();

    // 如果在等待回應的這段時間,已經有更新的請求送出去了,這次的結果就是過期的,不要套用
    if(seq < roadNameLatestAppliedSeq) return;

    let best = "未知道路";
    let min = Infinity;
    let bestTags = null;

    if(data.elements){
      for(const el of data.elements){
        if(!el.center || !el.tags?.name) continue;

        const d = getDistance(lat, lng, el.center.lat, el.center.lon);

        if(d < min){
          min = d;
          best = el.tags.name;
          bestTags = el.tags;
        }
      }
    }

    let isFreeway = false;

    if(bestTags){
      const hw = bestTags.highway || "";
      const ref = bestTags.ref || "";
      const name = bestTags.name || "";

      isFreeway =
        (hw === "motorway" && ref.includes("3")) ||
        name.includes("國道3") ||
        name.includes("國道三") ||
        name.includes("福爾摩沙");
    }

    roadNameLatestAppliedSeq = seq;

    const label = document.getElementById("roadLabel");
    const icon = document.querySelector(".rect4 .icon");

    if(label) label.innerText = best;

    if(icon){
      icon.style.display = isFreeway ? "block" : "none";
    }

  }catch(e){
    console.log("road name error", e);
  }
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function(){

  // ===== 📷 CCTV 即時影像:置中彈出視窗,定期自動重新連線避免串流斷掉後畫面卡住 =====
  const cctvImage = document.getElementById("cctvImage");
  const cctvStatus = document.getElementById("cctvStatus");
  const cctvOverlay = document.getElementById("cctvOverlay");
  const cctvPanelTitle = document.getElementById("cctvPanelTitle");
  let CCTV_BASE_URL = "";
  let CCTV_CURRENT_LABEL = "";
  const CCTV_REFRESH_INTERVAL = 8000; // 每 8 秒主動重新連線一次

  let cctvReloadTimer = null;

  function scheduleCctvReload(delay){
    // 只用一個計時器,排新的之前先取消舊的,避免兩個重連動作互相打架
    if(cctvReloadTimer){
      clearTimeout(cctvReloadTimer);
    }
    cctvReloadTimer = setTimeout(reloadCctvImage, delay);
  }

  function reloadCctvImage(){
    if(!cctvImage || !CCTV_BASE_URL) return;
    cctvImage.src = CCTV_BASE_URL + "&_t=" + Date.now();
    // 每次重連之後,重新排下一次的定期重連(不管這次是正常排程還是錯誤觸發的)
    scheduleCctvReload(CCTV_REFRESH_INTERVAL);
  }

  // 切換到地圖上點選的某一支監視器,並打開置中彈出視窗
  // camId: 該監視器的 id(用於追蹤目前顯示中的是哪一支,避免重複觸發)
  // isAuto: true 代表是「定位經過自動顯示」觸發的,false 代表是手動點擊圖示觸發的
  window.switchCctvCamera = function(url, label, camId, isAuto){
    CCTV_BASE_URL = url;
    CCTV_CURRENT_LABEL = label;
    if(cctvPanelTitle) cctvPanelTitle.textContent = "📷 " + label;
    if(cctvOverlay) cctvOverlay.classList.add("show");
    window.cctvActiveCameraId = camId || null;
    window.cctvActiveIsAuto = !!isAuto;
    reloadCctvImage();
  };

  // 關閉彈出視窗時,停止重連計時器,避免在背景一直跑浪費效能
  window.closeCctvOverlay = function(){
    if(cctvOverlay) cctvOverlay.classList.remove("show");
    if(cctvReloadTimer){
      clearTimeout(cctvReloadTimer);
      cctvReloadTimer = null;
    }
    CCTV_BASE_URL = "";
    window.cctvActiveCameraId = null;
    window.cctvActiveIsAuto = false;
  };

  // ===== 🖱️ 讓彈出視窗可以拖動(抓標題列當把手,滑鼠/觸控都支援) =====
  if(cctvOverlay && cctvPanelTitle){
    let dragStartX = 0;
    let dragStartY = 0;
    let overlayStartLeft = 0;
    let overlayStartTop = 0;
    let dragging = false;

    function getPointerXY(e){
      if(e.touches && e.touches.length){
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    function startDrag(e){
      dragging = true;
      const rect = cctvOverlay.getBoundingClientRect();
      // 第一次拖動時,把定位從「置中公式」換成固定的像素座標,之後才能用 left/top 自由移動
      cctvOverlay.style.left = rect.left + "px";
      cctvOverlay.style.top = rect.top + "px";
      cctvOverlay.style.transform = "none";

      overlayStartLeft = rect.left;
      overlayStartTop = rect.top;

      const p = getPointerXY(e);
      dragStartX = p.x;
      dragStartY = p.y;

      e.preventDefault();
    }

    function onDragMove(e){
      if(!dragging) return;
      const p = getPointerXY(e);
      const dx = p.x - dragStartX;
      const dy = p.y - dragStartY;
      cctvOverlay.style.left = (overlayStartLeft + dx) + "px";
      cctvOverlay.style.top = (overlayStartTop + dy) + "px";
    }

    function stopDrag(){
      dragging = false;
    }

    cctvPanelTitle.addEventListener("mousedown", startDrag);
    cctvPanelTitle.addEventListener("touchstart", startDrag, { passive: false });

    document.addEventListener("mousemove", onDragMove);
    document.addEventListener("touchmove", onDragMove, { passive: false });

    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchend", stopDrag);
  }

  if(cctvImage){
    cctvImage.addEventListener("load", function(){
      if(cctvStatus) cctvStatus.textContent = CCTV_CURRENT_LABEL;
    });

    cctvImage.addEventListener("error", function(){
      if(cctvStatus) cctvStatus.textContent = "影像連線中斷,正在重新連線...";
      // 斷線時提前重連,並取消原本排定的那一次,避免兩邊同時觸發
      scheduleCctvReload(3000);
    });
  }
});
</script>
