<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">

<title>Navigation Map</title>
<style>
/* ===== OpenStreetMap Layer ===== */
#map{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
} 

/* UI must be above map */
.rect2,.bottomBar,.rect4{
  z-index:2;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#C5DCF0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

.bottomBar{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:96px;
}

.rect1{
  box-sizing:border-box;
  position:absolute;
  left:8px;
  right:8px;
  top:0;
  height:96px;
  border-width:1.5px 1.5px 0 1.5px;
  border-style:solid;
  border-color:#FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);
  border-radius:11px 11px 0 0;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.rect3{
  position:absolute;
  width:46px;
  height:4px;
  left:50%;
  top:5px;
  transform:translateX(-50%);
  background:#74767A;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);
  border-radius:2.5px;
}

.info{
  position:absolute;
  left:50%;
  top:11px;
  transform:translateX(-50%);
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:20px;
  color:#000000;
  white-space:nowrap;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}

.rect4{
  box-sizing:border-box;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:106px;
  width:174px;
  height:33px;
  background:#FFFFFF;
  border:1.5px solid #FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  border-radius:16.5px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0px;
  z-index:5;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.rect4 .label{
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:16px;
  color:#000000;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}

.rect4 .icon{
  width:20px;
  height:20px;
  background:url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/TWHW3.svg/120px-TWHW3.svg.png') center/cover no-repeat;
  filter:drop-shadow(0px 4px 4px rgba(0,0,0,0.25));
  display:none;
}

.rect8{
  position:absolute;
  width:calc(100% - 16px);
  height:69px;
  left:8px;
  top:54px;
  background:#0E1A2D;
  border-radius:12px;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
}

.rect6{
  position:absolute;
  width:76px;
  height:76px;
  left:8px;
  top:132px;

.rect6 .speed-value {

.rect6 .speed-unit {

/* ===== 📻 網路電台播放器 ===== */
.radioPanel{
  position:absolute;
  right:10px;
  top:74px;
  width:168px;
  padding:10px;
  box-sizing:border-box;
  background:rgba(255,255,255,0.88);
  border:1px solid rgba(255,255,255,0.95);
  box-shadow:0 6px 18px rgba(14,26,45,0.18);
  border-radius:8px;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  z-index:4;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

.radioPanelTitle{
  font-size:13px;
  font-weight:700;
  color:#0E1A2D;
  margin-bottom:7px;
}

.radioStatus{
  min-height:16px;
  margin-bottom:8px;
  color:#36445A;
  font-size:11px;
  line-height:14px;
}

.radioStationList{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:8px;
}

.radioStationList button{
  height:28px;
  border:1px solid rgba(14,26,45,0.12);
  border-radius:8px;
  background:#FFFFFF;
  color:#0E1A2D;
  font-size:12px;
  font-weight:600;
  text-align:left;
  padding:0 8px;

.radioStationList button.active{

  border-color:#1E90FF;

.radioControls{
  display:flex;
  align-items:center;
  gap:8px;
}

.radioControls button{
  width:30px;
  height:30px;
  border:0;
  border-radius:50%;
  background:#0E1A2D;
  color:#FFFFFF;
  font-size:13px;
}

.radioControls button:active{
  transform:translateY(1px);
}

.radioVolume{
  flex:1;
}

/* ===== 📷 CCTV 即時影像 ===== */

  right:10px;
  top:240px;

  font-weight:700;
  color:#0E1A2D;
  margin-bottom:7px;

.cctvImage{

  background:#0E1A2D;

.cctvStatus{

  color:#36445A;

  line-height:13px;

.maplibregl-marker img{

html, body {

  padding: 0;
  height: 100%;

<div class="rect8"></div>

<script>
let userMarker = null;

function updateUserLocation(position) {
  const lng = position.coords.longitude;
  const lat = position.coords.latitude;

  const el = document.createElement('div');
  el.style.width = '16px';
  el.style.height = '16px';
  el.style.borderRadius = '50%';
  el.style.background = '#2F80FF';
  el.style.border = '3px solid white';
  el.style.boxShadow = '0 0 10px rgba(47,128,255,0.6)';

  if (userMarker) userMarker.remove();

  userMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat([lng, lat])
    .addTo(map);

  map.easeTo({ center: [lng, lat], zoom: 16 });
}

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(updateUserLocation);
}
</script>

    ];

      img.style.height = 'auto';

      img.style.objectFit = 'contain';

      new maplibregl.Marker({ element: img, anchor: 'center' })
        .setLngLat(coord)
        .addTo(map);
    });

    const specialImg5Coords = [
      [121.37787755482056, 24.947771604192354],
      [121.38507460502822, 24.948068846289413],
      [121.38016022200124, 24.949680343569657],
      [121.37559424522817, 24.945409207822877],
      [121.37858205889397, 24.94156110497883],
      [121.37184515889396, 24.947682971133588],
      [121.37404389999847, 24.944876455952407],
      [121.40115839999848, 24.97043428577425],
      [121.37921209447593, 24.93621992621962],
      [121.36047099999847, 24.937197361667018]
    ];

    specialImg5Coords.forEach(coord => {
      const img = document.createElement('img');
      img.src = 'https://www.park24.com.tw/upload/news_list_pic/twL_news_22G06_TyLKR2i7QE.png';
      img.style.width = '40px';
      img.style.height = 'auto';
      img.style.display = 'block';
      img.style.objectFit = 'contain';

      new maplibregl.Marker({ element: img, anchor: 'center' })
        .setLngLat(coord)
        .addTo(map);
    });

    routeSource = map.getSource('route');

    const A = [121.39431694905831, 24.95161377427496];
    const B = [121.40117103967137, 24.950945728162928];
    const C = [121.40115004678125, 24.95076327043688];
    const D = [121.39428811531214, 24.951394298417927];

    const polygon = [[
      A, B, C, D, A
    ]];

    routeSource.setData({
      type: 'FeatureCollection',
      features: [{
        type: 'Feature',
        geometry: {
          type: 'Polygon',
          coordinates: polygon
        }
      }]
    });

  });

  function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = 
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  function formatTime(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    return `${hours}小時${minutes}分鐘`;
  }

  function updateDisplay(speed, elapsedMs) {
    rect6SpeedValue.innerText = Math.round(speed);
    infoElement.innerText = `${formatTime(elapsedMs)} ${totalDistance.toFixed(2)}公里`;
  }

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition((pos) => {
      const now = Date.now();
      const currentLat = pos.coords.latitude;
      const currentLon = pos.coords.longitude;
      const currentSpeed = pos.coords.speed || 0;

      if (!startTime) {
        startTime = now;
        lastPosition = { lat: currentLat, lon: currentLon };
        routeCoordinates = [[currentLon, currentLat]];
      }

      if (lastPosition) {
        const distance = calculateDistance(lastPosition.lat, lastPosition.lon, currentLat, currentLon);
        totalDistance += distance;
        lastPosition = { lat: currentLat, lon: currentLon };
      }

      if (lastPosition) {
        const d = calculateDistance(lastPosition.lat, lastPosition.lon, currentLat, currentLon);
        if (d > 0.005) {
          routeCoordinates.push([currentLon, currentLat]);
        }
      }

      if (routeSource) {
        routeSource.setData({
          type: 'FeatureCollection',
          features: [{
            type: 'Feature',
            geometry: {
              type: 'LineString',
              coordinates: routeCoordinates
            }
          }]
        });
      }

      map.flyTo({
        center: [currentLon, currentLat],
        zoom: 15,
        speed: 0.5
      });

      if (!marker) {
        const el = document.createElement('div');
        el.style.width = '20px';
        el.style.height = '20px';
        el.style.backgroundColor = '#3b82f6';
        el.style.borderRadius = '50%';
        el.style.border = '2px solid white';
        el.style.boxShadow = '0 2px 4px rgba(0,0,0,0.3)';

        marker = new maplibregl.Marker(el).setLngLat([currentLon, currentLat]).addTo(map);
      } else {
        marker.setLngLat([currentLon, currentLat]);
      }

      const elapsedMs = now - startTime;
      const speedKmh = currentSpeed * 3.6;

      updateDisplay(speedKmh, elapsedMs);
      updateRoadName(currentLon, currentLat);
      console.log('road update trigger', currentLon, currentLat);
      updateRoadName(currentLon, currentLat);

    }, (err) => {
      console.error('GPS error:', err);
      rect6SpeedValue.innerText = '×';
      rect6SpeedUnit.innerText = 'GPS';
    }, {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 10000
    });
  } else {
    alert('您的瀏覽器不支援地理定位功能');
  }
</script>

<script>
async function updateRoadName(lng, lat){
  try{
    const R = 6371e3;
    const toRad = Math.PI / 180;

    function getDistance(lat1, lon1, lat2, lon2){
      const dLat = (lat2 - lat1) * toRad;
      const dLon = (lon2 - lon1) * toRad;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toRad)*Math.cos(lat2*toRad)*Math.sin(dLon/2)**2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    const query = `
    [out:json];
    way(around:10,${lat},${lng})["highway"]["name"];
    out center;
    `;

    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: query
    });

    const data = await res.json();

    let best = "未知道路";
    let min = Infinity;
    let bestTags = null;

    if(data.elements){
      for(const el of data.elements){
        if(!el.center || !el.tags?.name) continue;

        const d = getDistance(lat, lng, el.center.lat, el.center.lon);

        if(d < min){
          min = d;
          best = el.tags.name;
          bestTags = el.tags;
        }
      }
    }

    let isFreeway = false;

    if(bestTags){
      const hw = bestTags.highway || "";
      const ref = bestTags.ref || "";
      const name = bestTags.name || "";

      isFreeway =
        (hw === "motorway" && ref.includes("3")) ||
        name.includes("國道3") ||
        name.includes("國道三") ||
        name.includes("福爾摩沙");
    }

    const label = document.getElementById("roadLabel");
    const icon = document.querySelector(".rect4 .icon");

    if(label) label.innerText = best;

    if(icon){
      icon.style.display = isFreeway ? "block" : "none";
    }

  }catch(e){
    console.log("road name error", e);
  }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js"></script>
<script>
// ===== 📻 網路電台播放器 =====
// 提醒:網路電台串流網址常常會變動或失效,如果某個電台播不出來,
// 之後可以換成別的串流網址。

const RADIO_STATIONS = [
  { name: "ICRT", url: "https://live.leanstream.co/ICRTFM-MP3", isHls: false },
  { name: "央廣 RTI 國語", url: "https://www.soundvideostar.com/live/definst/rti3/playlist.m3u8", isHls: true },
  { name: "央廣 RTI 音樂台", url: "https://www.soundvideostar.com/live/definst/rti4/playlist.m3u8", isHls: true }
];

let radioCurrentIndex = -1;
let radioHls = null;

function buildRadioStationButtons(){
  const list = document.getElementById("radioStationList");
  if(!list) return;

  list.innerHTML = "";

  RADIO_STATIONS.forEach((station, index) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = station.name;
    btn.onclick = () => playRadioStation(index);
    list.appendChild(btn);
  });
}

function updateRadioActiveButton(){
  const list = document.getElementById("radioStationList");
  if(!list) return;

  Array.from(list.children).forEach((btn, index) => {
    btn.classList.toggle("active", index === radioCurrentIndex);
  });
}

function stopRadioHls(){
  if(radioHls){
    radioHls.destroy();
    radioHls = null;
  }
}

function playRadioStation(index){
  const audio = document.getElementById("radioAudio");
  const statusEl = document.getElementById("radioStatus");
  const station = RADIO_STATIONS[index];
  if(!audio || !station) return;

  radioCurrentIndex = index;
  updateRadioActiveButton();

  statusEl.textContent = "連線中... " + station.name;

  stopRadioHls();

  if(station.isHls){
    // .m3u8 格式:Safari 原生支援,其他瀏覽器用 hls.js 函式庫播放
    if(audio.canPlayType("application/vnd.apple.mpegurl")){
      audio.src = station.url;
    }else if(window.Hls && window.Hls.isSupported()){
      radioHls = new window.Hls();
      radioHls.loadSource(station.url);
      radioHls.attachMedia(audio);
      radioHls.on(window.Hls.Events.ERROR, function(event, data){
        if(data && data.fatal){
          statusEl.textContent = station.name + " 串流發生錯誤";
        }
      });
    }else{
      statusEl.textContent = "此瀏覽器不支援這個串流格式";
      return;
    }
  }else{
    audio.src = station.url;
  }

  audio.play()
    .then(() => {
      statusEl.textContent = "正在播放:" + station.name;
      document.getElementById("radioPlayBtn").textContent = "⏸";
    })
    .catch(() => {
      statusEl.textContent = station.name + " 播放失敗,可能是串流已失效";
    });
}

function toggleRadioPlay(){
  const audio = document.getElementById("radioAudio");
  const statusEl = document.getElementById("radioStatus");
  const playBtn = document.getElementById("radioPlayBtn");
  if(!audio) return;

  if(radioCurrentIndex === -1){
    playRadioStation(0);
    return;
  }

  if(audio.paused){
    audio.play()
      .then(() => {
        playBtn.textContent = "⏸";
        statusEl.textContent = "正在播放:" + RADIO_STATIONS[radioCurrentIndex].name;
      })
      .catch(() => {
        statusEl.textContent = "播放失敗,可能是串流已失效";
      });
  }else{
    audio.pause();
    playBtn.textContent = "▶";
    statusEl.textContent = "已暫停:" + RADIO_STATIONS[radioCurrentIndex].name;
  }
}

function setRadioVolume(value){
  const audio = document.getElementById("radioAudio");
  if(audio) audio.volume = parseFloat(value);
}

document.addEventListener("DOMContentLoaded", function(){
  buildRadioStationButtons();

  const audio = document.getElementById("radioAudio");
  if(audio){
    audio.volume = 0.8;
    audio.addEventListener("error", function(){
      const statusEl = document.getElementById("radioStatus");
      if(radioCurrentIndex !== -1 && statusEl){
        statusEl.textContent = RADIO_STATIONS[radioCurrentIndex].name + " 串流發生錯誤";
      }
    });
  }
});
</script>
