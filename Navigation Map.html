<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navigation Map</title>
<style>
/* ===== OpenStreetMap Layer ===== */
#map{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
} 

/* UI must be above map */
.rect2,.bottomBar,.rect4{
  z-index:2;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#1A202B;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

/* ===== 底部整組（原形一起移動） ===== */
.bottomBar{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:96px;
}

.rect1{
  box-sizing:border-box;
  position:absolute;
  left:8px;
  right:8px;
  top:0;
  height:96px;
  background:#15171A;
  border-width:2px 2px 0 2px;
  border-style:solid;
  border-color:#232830;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);
  border-radius:11px 11px 0 0;
}

.rect3{
  position:absolute;
  width:46px;
  height:4px;
  left:50%;
  top:5px;
  transform:translateX(-50%);
  background:#74767A;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);
  border-radius:2.5px;
}

.info{
  position:absolute;
  left:50%;
  top:11px;
  transform:translateX(-50%);
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:20px;
  color:#FFFFFF;
  white-space:nowrap;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}

/* ===== Rectangle 4 ===== */
.rect4{
  box-sizing:border-box;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:106px;
  width:174px;
  height:33px;
  background:#15171A;
  border:2px solid #232830;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  border-radius:16.5px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  z-index:5;
}

.rect4 .label{
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:16px;
  color:#FFFFFF;
}

.rect4 .icon{
  width:20px;
  height:20px;
  background:url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/TWHW3.svg/120px-TWHW3.svg.png') center/cover no-repeat;
  filter:drop-shadow(0px 4px 4px rgba(0,0,0,0.25));
}

/* ===== Rectangle 8 ===== */
.rect8{
  position:absolute;
  width:calc(100% - 16px);
  height:69px;
  left:8px;
  top:54px;
  background:#0E1A2D;
  border-radius:12px;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
}

/* ===== Rectangle 6（GPS圓形：中間顯示時數） ===== */
.rect6{
  position:absolute;
  width:76px;
  height:76px;
  left:8px;
  top:132px;
  background:#0D162A;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  border-radius:38px;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:40px;
  font-weight:400;
  color:#FFFFFF;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="rect8"></div>

<div class="rect6">0</div>

<div class="bottomBar">
  <div class="rect4">
    <div class="label">福爾摩沙高速公路</div>
    <div class="icon"></div>
  </div>
  <div class="rect1"></div>
  <div class="rect3"></div>
  <div class="info">0小時0分鐘 0公里</div>
</div>

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://demotiles.maplibre.org/style.json',
    center: [121.4629, 25.0173],
    zoom: 15,
    pitch: 60,
    bearing: -20
  });
  map.addControl(new maplibregl.NavigationControl());

  // ===== Real GPS (only for rect6) =====
  const rect6 = document.querySelector('.rect6');
  let startTime = null;

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition((pos) => {
      const now = new Date();

      if (!startTime) {
        startTime = now;
      }

      const diffMs = now - startTime;
      const hours = Math.floor(diffMs / 3600000);

      rect6.innerText = hours;

    }, (err) => {
      console.log('GPS error:', err);
    }, {
      enableHighAccuracy: true,
      maximumAge: 1000
    });
  }
</script>

</body>
</html>
