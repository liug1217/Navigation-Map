<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Navigation Map</title>
<style>
/* ===== OpenStreetMap Layer ===== */
#map{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
} 

/* UI must be above map */
.rect2,.bottomBar,.rect4{
  z-index:2;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#C5DCF0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

.bottomBar{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:166px;
}

.rect1{
  box-sizing:border-box;
  position:absolute;
  left:8px;
  right:8px;
  top:0;
  height:166px;
  border-width:1.5px 1.5px 0 1.5px;
  border-style:solid;
  border-color:#FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);
  border-radius:11px 11px 0 0;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.rect3{
  position:absolute;
  width:46px;
  height:4px;
  left:50%;
  top:5px;
  transform:translateX(-50%);
  background:#74767A;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);
  border-radius:2.5px;
}

.info{
  position:absolute;
  left:50%;
  top:11px;
  transform:translateX(-50%);
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:20px;
  color:#000000;
  white-space:nowrap;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}

.rect4{
  box-sizing:border-box;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:176px;
  width:237px;
  height:33px;
  background:#FFFFFF;
  border:1.5px solid #FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  border-radius:16.5px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0px;
  z-index:5;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.rect4 .label{
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:16px;
  color:#000000;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.rect4 .icon{
  width:20px;
  height:20px;
  background:url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/TWHW3.svg/120px-TWHW3.svg.png') center/cover no-repeat;
  filter:drop-shadow(0px 4px 4px rgba(0,0,0,0.25));
  display:none;
  margin-left:6px;
}

.rect8{
  position:absolute;
  width:calc(100% - 16px);
  height:69px;
  left:8px;
  top:54px;
  background:#0E1A2D;
  border-radius:12px;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
}

.rect6{
  position:absolute;
  width:76px;
  height:76px;
  left:8px;
  top:132px;
  background:#FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  border-radius:38px;

  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction: column;

  font-size:24px;
  font-weight:400;
  color:#000000;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

.rect6 .speed-value {
  font-size: 32px;
  font-weight: 600;
}

.rect6 .speed-unit {
  font-size: 12px;
  font-weight: 400;
}

/* ===== рҹҶ• еә•йғЁйқўжқҝеӨ§ж”№зүҲж–°еўһе…ғд»¶ ===== */
.arrivalText{
  position:absolute;
  left:50%;
  top:35px;
  transform:translateX(-50%);
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:20px;
  color:#404345;
  white-space:nowrap;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}

.navExitBtn,.navOverviewBtn{
  position:absolute;
  top:40px;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:13px;
  color:#000000;
  background:none;
  border:none;
  padding:6px;
  cursor:pointer;
}

.navExitBtn{ left:14px; }
.navOverviewBtn{ right:14px; }

.navInfoCard{
  box-sizing:border-box;
  position:absolute;
  left:12px;
  right:12px;
  top:69px;
  height:60px;
  background:#FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  border-radius:8px;
  display:flex;
  align-items:center;
  overflow:hidden;
}

.navInfoCardIcon{
  width:59px;
  height:60px;
  flex-shrink:0;
  background:url('https://upload.wikimedia.org/wikipedia/zh/thumb/d/d1/ROC_Police_Broadcasting_Service_Seal.svg/1280px-ROC_Police_Broadcasting_Service_Seal.svg.png') center/contain no-repeat #FFFFFF;
  border-radius:8px;
}

.navInfoCardText{
  margin-left:12px;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:14px;
  color:#000000;
}


/* ===== рҹ“» з¶Іи·Ҝйӣ»еҸ°ж’ӯж”ҫеҷЁ ===== */
.radioPanel{
  position:absolute;
  right:10px;
  top:74px;
  width:168px;
  padding:10px;
  box-sizing:border-box;
  background:rgba(255,255,255,0.88);
  border:1px solid rgba(255,255,255,0.95);
  box-shadow:0 6px 18px rgba(14,26,45,0.18);
  border-radius:8px;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  z-index:4;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

.radioPanelTitle{
  font-size:13px;
  font-weight:700;
  color:#0E1A2D;
  margin-bottom:7px;
}

.radioStatus{
  min-height:16px;
  margin-bottom:8px;
  color:#36445A;
  font-size:11px;
  line-height:14px;
}

.radioStationList{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:8px;
}

.radioStationList button{
  height:28px;
  border:1px solid rgba(14,26,45,0.12);
  border-radius:8px;
  background:#FFFFFF;
  color:#0E1A2D;
  font-size:12px;
  font-weight:600;
  text-align:left;
  padding:0 8px;
}

.radioStationList button.active{
  background:#1E90FF;
  border-color:#1E90FF;
  color:#FFFFFF;
}

.radioControls{
  display:flex;
  align-items:center;
  gap:8px;
}

.radioControls button{
  width:30px;
  height:30px;
  border:0;
  border-radius:50%;
  background:#0E1A2D;
  color:#FFFFFF;
  font-size:13px;
}

.radioControls button:active{
  transform:translateY(1px);
}

.radioVolume{
  flex:1;
}

/* ===== рҹ“· CCTV еҚіжҷӮеҪұеғҸ ===== */
/* ===== рҹ“· CCTV еҚіжҷӮеҪұеғҸ:зҪ®дёӯеӨ§е°әеҜёеҪҲеҮәиҰ–зӘ— ===== */
.cctvOverlay{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:88%;
  max-width:640px;
  padding:14px;
  box-sizing:border-box;
  background:rgba(14,26,45,0.95);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 12px 40px rgba(0,0,0,0.45);
  border-radius:14px;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  z-index:50;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  display:none;
}

.cctvOverlay.show{
  display:block;
}

.cctvPanelTitle{
  font-size:18px;
  font-weight:700;
  color:#FFFFFF;
  margin-bottom:10px;
  padding-right:36px;
  cursor:move;
  user-select:none;
}

.cctvImage{
  width:100%;
  border-radius:8px;
  display:block;
  background:#000000;
}

.cctvStatus{
  margin-top:10px;
  color:#B9C2D0;
  font-size:13px;
  line-height:17px;
}

.cctvCloseBtn{
  position:absolute;
  top:10px;
  right:10px;
  width:30px;
  height:30px;
  border:0;
  border-radius:50%;
  background:rgba(255,255,255,0.12);
  color:#FFFFFF;
  font-size:18px;
  line-height:30px;
  text-align:center;
  cursor:pointer;
}

.cctvCloseBtn:active{
  background:rgba(255,255,255,0.25);
}

.maplibregl-marker img{
  width:40px !important;
  height:auto !important;
  object-fit:contain;
  display:block;
}

.maplibregl-user-location-dot{
  background-color:#1E90FF !important;
  width:14px !important;
  height:14px !important;
  border-radius:50%;
  border:2px solid #ffffff !important;
  box-shadow:0 0 0 6px rgba(30,144,255,0.25);
}

.maplibregl-user-location-accuracy-circle{
  fill:rgba(30,144,255,0.15) !important;
}

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  touch-action: none;
}
</style>
</head>

<div class="rect8"></div>

  <div class="navInfoCard">
    <div class="navInfoCardIcon"></div>

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

<script>
let userMarker = null;

function updateUserLocation(position) {
  const lng = position.coords.longitude;
  const lat = position.coords.latitude;

  const el = document.createElement('div');
  el.style.width = '16px';
  el.style.height = '16px';
  el.style.borderRadius = '50%';
  el.style.background = '#2F80FF';
  el.style.border = '3px solid white';
  el.style.boxShadow = '0 0 10px rgba(47,128,255,0.6)';

  if (userMarker) userMarker.remove();

  userMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat([lng, lat])
    .addTo(map);

  map.easeTo({ center: [lng, lat], zoom: 16 });
}

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(updateUserLocation);
}
</script>
<script src="https://unpkg.com/@maplibre/maplibre-gl-geocoder/dist/maplibre-gl-geocoder.min.js"></script>
<script>
  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: [121.394, 24.951],
    zoom: 16,
    pitch: 60,
    bearing: -20,
    antialias: true
  });

  map.on('load', () => {
    map.dragRotate.disable();
    map.touchZoomRotate.disableRotation();
    map.boxZoom.disable();
    map.scrollZoom.enable();
    map.dragPan.enable();
  });

  map.on('load',()=>{

const geolocate = new maplibregl.GeolocateControl({
  positionOptions: {
    enableHighAccuracy: true
  },
  trackUserLocation: true,
  showUserHeading: true
});

map.addControl(geolocate);
geolocate.trigger();
    const layers = map.getStyle().layers;
    let labelLayerId;

    for (let i = 0; i < layers.length; i++) {
      if (layers[i].type === 'symbol') {
        labelLayerId = layers[i].id;
        break;
      }
    }

    map.addLayer(
      {
        id: '3d-buildings',
        source: 'openmaptiles',
        'source-layer': 'building',
        type: 'fill-extrusion',
        minzoom: 15,
        paint: {
        'fill-extrusion-height': 0.1,
        'fill-extrusion-base': 0,
          'fill-extrusion-color': '#aaa',
          'fill-extrusion-height': [
            'interpolate',
            ['linear'],
            ['zoom'],
            15,
            0,
            15.05,
            ['get', 'height']
          ],
          'fill-extrusion-base': [
            'interpolate',
            ['linear'],
            ['zoom'],
            15,
            0,
            15.05,
            ['get', 'min_height']
          ],
          'fill-extrusion-opacity': 0.8
        }
      },
      labelLayerId
    );
  });
  map.addControl(new maplibregl.NavigationControl());


  const infoElement = document.querySelector('.info');
  const rect6SpeedValue = document.querySelector('.rect6 .speed-value');
  const rect6SpeedUnit = document.querySelector('.rect6 .speed-unit');
  
  let startTime = null;
  let lastPosition = null;
  let totalDistance = 0;
  let routeCoordinates = [];
  let marker = null;
  let routeSource = null;

  // ===== рҹҶ• йҖҖеҮә / е…ЁиҰҪ жҢүйҲ• =====
  const navExitBtn = document.getElementById('navExitBtn');
  const navOverviewBtn = document.getElementById('navOverviewBtn');

  if(navExitBtn){
    navExitBtn.addEventListener('click', () => {
      if(confirm('иҰҒзөҗжқҹжң¬ж¬Ўи·Ҝз·ҡиЁҳйҢ„дёҰйҮҚж–°й–Ӣе§Ӣе—Һ?')){
        location.reload();
      }
    });
  }

  if(navOverviewBtn){
    navOverviewBtn.addEventListener('click', () => {
      if(routeCoordinates.length < 2){
        // йӮ„жІ’жңүи¶іеӨ зҡ„и·Ҝз·ҡиіҮж–ҷ,зӣҙжҺҘжҠҠзӣ®еүҚдҪҚзҪ®зё®е°ҸзңӢдёҖдёӢйҖұйӮҠ
        if(routeCoordinates.length === 1){
          map.easeTo({ center: routeCoordinates[0], zoom: 13 });
        }
        return;
      }
      const lons = routeCoordinates.map(c => c[0]);
      const lats = routeCoordinates.map(c => c[1]);
      const bounds = [
        [Math.min(...lons), Math.min(...lats)],
        [Math.max(...lons), Math.max(...lats)]
      ];
      map.fitBounds(bounds, { padding: 80, duration: 800 });
    });
  }

  map.on('load', () => {
    map.addSource('route', {
      type: 'geojson',
      data: {
        type: 'FeatureCollection',
        features: []
      }
    });

    map.addLayer({
      id: 'route',
      type: 'fill-extrusion',
      source: 'route',
      paint: {
        'fill-extrusion-color': '#888888',
        'fill-extrusion-height': 0.1,
        'fill-extrusion-base': 0,
        'fill-extrusion-opacity': 1
      }
    });

    map.addLayer({
      id: 'route-outline',
      type: 'line',
      source: 'route',
      layout: {
        'line-join': 'round',
        'line-cap': 'round'
      },
      paint: {
        'line-color': '#ffffff',
        'line-width': 4,
        'line-opacity': 1
      }
    });

    map.addSource('road-marking', {
      type: 'geojson',
      data: {
        type: 'FeatureCollection',
        features: [{
          type: 'Feature',
          geometry: {
            type: 'LineString',
            coordinates: [
              [121.39249524004471, 24.95169532386274],
              [121.40284752438394, 24.95075216220213]
            ]
          }
        }]
      }
    });

    map.addLayer({
      id: 'road-marking',
      type: 'line',
      source: 'road-marking',
      layout: {
        'line-join': 'round',
        'line-cap': 'round'
      },
      paint: {
        'line-color': '#ffffff',
        'line-width': 2,
        'line-opacity': 1
      }
    });

    map.addSource('road-marking-2', {
      type: 'geojson',
      data: {
        type: 'FeatureCollection',
        features: [{
          type: 'Feature',
          geometry: {
            type: 'LineString',
            coordinates: [
              [121.38221308869691, 24.946019147702295],
              [121.38232507092059, 24.9460392114842],
              [121.38260277126123, 24.9442672449878],
              [121.38272347066383, 24.944294605078653]
            ]
          }
        }]
      }
    });

    map.addLayer({
      id: 'road-marking-2',
      type: 'line',
      source: 'road-marking-2',
      layout: {
        'line-join': 'round',
        'line-cap': 'round'
      },
      paint: {
        'line-color': '#ffffff',
        'line-width': 2,
        'line-opacity': 1
      }
    });

    const bounds = new maplibregl.LngLatBounds();

    bounds.extend([121.39249524004471, 24.95169532386274]);
    bounds.extend([121.40284752438394, 24.95075216220213]);

    bounds.extend([121.38221308869691, 24.946019147702295]);
    bounds.extend([121.38232507092059, 24.9460392114842]);
    bounds.extend([121.38260277126123, 24.9442672449878]);
    bounds.extend([121.38272347066383, 24.944294605078653]);

    map.fitBounds(bounds, {
      padding: 80,
      duration: 1200
    });

    const coordsList = [
      [121.37947362099798, 24.946599763017144],
      [121.37528481579257, 24.946239254457673],
      [121.37455524322034, 24.943374860273078],
      [121.37185799523179, 24.93045045727364],
      
    ];

    const offsets = [
      [0, 0],
      [0, 0],
      [0, 0]
    ];

    coordsList.forEach((coord, i) => {
      const img = document.createElement('img');
      img.src = 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQNHtMeiL_EeFFUYcvvhbtqkCYEx5rvfdqx0w&s';
      img.style.width = '40px';
      img.style.height = 'auto';
      img.style.display = 'block';

      new maplibregl.Marker({

        .addTo(map);
    });

    const fmCoords = [
      [121.38394404399801, 24.948573900819657],
      [121.38263683357708, 24.94498354227102],
      [121.38134713998998, 24.94659315185402],
      [121.37858227731472, 24.950267809527947],
      [121.37939884588098, 24.948104546231093],
      [121.37804640419316, 24.946080067551595],
      [121.37886297200315, 24.943396177784525],
      [121.36709342576458, 24.936255236556708],
      [121.37348375172652, 24.937404929473203],
      [121.37556342603465, 24.936895876051967],
      [121.37491272680614, 24.938214773604724],
      [121.348450215826973, 24.948450215826973],
      [121.37372821526003, 24.945389664931483],
      [121.37693068874358, 24.945181430197934],
      [121.28993368427153, 24.92692051789342],
      [121.29087268394721, 24.93033551876294],
      [121.28817864291375, 24.93679361852739], 
      [121.28904617384562, 24.94780176839251], 
      [121.28345061938427, 24.94825927361584]
    ];

  function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = 
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  // ===== рҹ“· е®ҡдҪҚз¶“йҒҺзӣЈиҰ–еҷЁйҷ„иҝ‘жҷӮиҮӘеӢ•йЎҜзӨә =====
  const CCTV_AUTO_SHOW_RADIUS_KM = 0.1; // 100 е…¬е°әе…§иҰ–зӮәгҖҢз¶“йҒҺгҖҚ

  function checkCctvProximity(lat, lon){
    const cameras = window.cctvCameras;
    if(!cameras || !cameras.length) return;

    // жүҫеҮәзҜ„еңҚе…§жңҖиҝ‘зҡ„дёҖж”ҜзӣЈиҰ–еҷЁ
    let nearest = null;
    let nearestDist = Infinity;
    for(let i = 0; i < cameras.length; i++){
      const cam = cameras[i];
      const d = calculateDistance(lat, lon, cam.lat, cam.lon);
      if(d <= CCTV_AUTO_SHOW_RADIUS_KM && d < nearestDist){
        nearest = cam;
        nearestDist = d;
      }
    }

    if(nearest){
      // зҜ„еңҚе…§жңүзӣЈиҰ–еҷЁ,дё”йӮ„жІ’йЎҜзӨәйҖҷдёҖж”Ҝзҡ„з•«йқў,е°ұиҮӘеӢ•еҲҮжҸӣйҒҺеҺ»
      if(window.cctvActiveCameraId !== nearest.id){
        const label = window.buildCctvLabel ? window.buildCctvLabel(nearest) : (nearest.road + " " + nearest.mile);
        window.switchCctvCamera(nearest.url, label, nearest.id, true);
      }
    } else {
      // зҜ„еңҚеӨ–:еҰӮжһңзӣ®еүҚйЎҜзӨәзҡ„жҳҜгҖҢиҮӘеӢ•и§ёзҷјгҖҚй–Ӣзҡ„,е°ұиҮӘеӢ•й—ңй–ү;жүӢеӢ•й»һй–Ӣзҡ„з¶ӯжҢҒдёҚеӢ•
      if(window.cctvActiveCameraId && window.cctvActiveIsAuto){
        window.closeCctvOverlay();
      }
    }
  }

  function formatTime(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    return `${hours}е°ҸжҷӮ${minutes}еҲҶйҗҳ`;
  }

  function updateDisplay(speed, elapsedMs) {
    rect6SpeedValue.innerText = Math.round(speed);
    infoElement.innerText = `${formatTime(elapsedMs)} ${totalDistance.toFixed(2)}е…¬йҮҢ`;
  }

  // ===== е№іж»‘з§»еӢ•е®ҡдҪҚй»һ(з”ЁеӢ•з•«жҸ’еҖј,дёҚиҰҒзһ¬й–“и·іиҪү) =====
  let markerAnimFrame = null;
  let markerDisplayLngLat = null; // зӣ®еүҚз•«йқўдёҠеҜҰйҡӣйЎҜзӨәзҡ„дҪҚзҪ®(еӢ•з•«зҡ„иө·й»һ)

  function animateMarkerTo(targetLng, targetLat, duration){
    if(!marker) return;

    // з¬¬дёҖж¬ЎйӮ„жІ’жңүиө·й»һдҪҚзҪ®жҷӮ,зӣҙжҺҘе®ҡдҪҚйҒҺеҺ»,дёҚйңҖиҰҒеӢ•з•«
    if(!markerDisplayLngLat){
      markerDisplayLngLat = [targetLng, targetLat];
      marker.setLngLat(markerDisplayLngLat);
      return;
    }

    const startLng = markerDisplayLngLat[0];
    const startLat = markerDisplayLngLat[1];
    const startTimeMs = performance.now();

    if(markerAnimFrame){
      cancelAnimationFrame(markerAnimFrame);
    }

    function step(){
      const elapsed = performance.now() - startTimeMs;
      const t = Math.min(1, elapsed / duration);
      // easeOutCubic,и®“з§»еӢ•жңүиҮӘз„¶зҡ„жёӣйҖҹж„ҹ,дёҚжңғжӯ»жқҝең°зӯүйҖҹз§»еӢ•
      const eased = 1 - Math.pow(1 - t, 3);

      const lng = startLng + (targetLng - startLng) * eased;
      const lat = startLat + (targetLat - startLat) * eased;

      markerDisplayLngLat = [lng, lat];
      marker.setLngLat(markerDisplayLngLat);

      if(t < 1){
        markerAnimFrame = requestAnimationFrame(step);
      }
    }

    markerAnimFrame = requestAnimationFrame(step);
  }

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition((pos) => {
      const now = Date.now();
      const currentLat = pos.coords.latitude;
      const currentLon = pos.coords.longitude;
      const currentSpeed = pos.coords.speed || 0;

      if (!startTime) {
        startTime = now;
        lastPosition = { lat: currentLat, lon: currentLon };
        routeCoordinates = [[currentLon, currentLat]];
      }

      if (lastPosition) {
        const distance = calculateDistance(lastPosition.lat, lastPosition.lon, currentLat, currentLon);
        totalDistance += distance;
        lastPosition = { lat: currentLat, lon: currentLon };
      }

      if (lastPosition) {
        const d = calculateDistance(lastPosition.lat, lastPosition.lon, currentLat, currentLon);
        if (d > 0.005) {
          routeCoordinates.push([currentLon, currentLat]);
        }
      }

      if (routeSource) {
        routeSource.setData({
          type: 'FeatureCollection',
          features: [{
            type: 'Feature',
            geometry: {
              type: 'LineString',
              coordinates: routeCoordinates
            }
          }]
        });
      }

      map.easeTo({
        center: [currentLon, currentLat],
        zoom: 15,
        duration: 1000
      });

      if (!marker) {
        const el = document.createElement('div');
        el.style.width = '20px';
        el.style.height = '20px';
        el.style.backgroundColor = '#3b82f6';
        el.style.borderRadius = '50%';
        el.style.border = '2px solid white';
        el.style.boxShadow = '0 2px 4px rgba(0,0,0,0.3)';

        marker = new maplibregl.Marker(el).setLngLat([currentLon, currentLat]).addTo(map);
        markerDisplayLngLat = [currentLon, currentLat];
      } else {
        // з”Ё 1 з§’зҡ„е№іж»‘еӢ•з•«з§»еӢ•йҒҺеҺ»,иҖҢдёҚжҳҜзһ¬й–“и·іиҪүеҲ°ж–°еә§жЁҷ
        animateMarkerTo(currentLon, currentLat, 1000);
      }

      const elapsedMs = now - startTime;
      const speedKmh = currentSpeed * 3.6;

      updateDisplay(speedKmh, elapsedMs);
      updateRoadName(currentLon, currentLat);
      console.log('road update trigger', currentLon, currentLat);
      updateRoadName(currentLon, currentLat);

      // е®ҡдҪҚз¶“йҒҺзӣЈиҰ–еҷЁйҷ„иҝ‘жҷӮиҮӘеӢ•йЎҜзӨәеҪҲеҮәиҰ–зӘ—
      checkCctvProximity(currentLat, currentLon);

    }, (err) => {
      console.error('GPS error:', err);
      rect6SpeedValue.innerText = 'Г—';
      rect6SpeedUnit.innerText = 'GPS';
    }, {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 10000
    });
  } else {
    alert('жӮЁзҡ„зҖҸиҰҪеҷЁдёҚж”ҜжҸҙең°зҗҶе®ҡдҪҚеҠҹиғҪ');
  }
</script>

<script>
async function updateRoadName(lng, lat){
  try{
    const R = 6371e3;
    const toRad = Math.PI / 180;

    function getDistance(lat1, lon1, lat2, lon2){
      const dLat = (lat2 - lat1) * toRad;
      const dLon = (lon2 - lon1) * toRad;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toRad)*Math.cos(lat2*toRad)*Math.sin(dLon/2)**2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    const query = `
    [out:json];
    way(around:10,${lat},${lng})["highway"]["name"];
    out center;
    `;

    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      body: query
    });

    const data = await res.json();

    let best = "жңӘзҹҘйҒ“и·Ҝ";
    let min = Infinity;
    let bestTags = null;

    if(data.elements){
      for(const el of data.elements){
        if(!el.center || !el.tags?.name) continue;

        const d = getDistance(lat, lng, el.center.lat, el.center.lon);

        if(d < min){
          min = d;
          best = el.tags.name;
          bestTags = el.tags;
        }
      }
    }

    let isFreeway = false;

    if(bestTags){
      const hw = bestTags.highway || "";
      const ref = bestTags.ref || "";
      const name = bestTags.name || "";

      isFreeway =
        (hw === "motorway" && ref.includes("3")) ||
        name.includes("еңӢйҒ“3") ||
        name.includes("еңӢйҒ“дёү") ||
        name.includes("зҰҸзҲҫж‘©жІҷ");
    }

    const label = document.getElementById("roadLabel");
    const icon = document.querySelector(".rect4 .icon");

    if(label) label.innerText = best;

    if(icon){
      icon.style.display = isFreeway ? "block" : "none";
    }

  }catch(e){
    console.log("road name error", e);
  }
}
</script>

<script>
// ===== рҹ“» з¶Іи·Ҝйӣ»еҸ°ж’ӯж”ҫеҷЁ =====
// жҸҗйҶ’:з¶Іи·Ҝйӣ»еҸ°дёІжөҒз¶ІеқҖеёёеёёжңғи®ҠеӢ•жҲ–еӨұж•Ҳ,еҰӮжһңжҹҗеҖӢйӣ»еҸ°ж’ӯдёҚеҮәдҫҶ,
// д№ӢеҫҢеҸҜд»ҘжҸӣжҲҗеҲҘзҡ„дёІжөҒз¶ІеқҖгҖӮ

const RADIO_STATIONS = [
  { name: "ICRT", url: "https://live.leanstream.co/ICRTFM-MP3", isHls: false },
  { name: "еӨ®е»Ј RTI еңӢиӘһ", url: "https://www.soundvideostar.com/live/definst/rti3/playlist.m3u8", isHls: true },
  { name: "еӨ®е»Ј RTI йҹіжЁӮеҸ°", url: "https://www.soundvideostar.com/live/definst/rti4/playlist.m3u8", isHls: true }
];

let radioCurrentIndex = -1;
let radioHls = null;

function buildRadioStationButtons(){
  const list = document.getElementById("radioStationList");
  if(!list) return;

  list.innerHTML = "";

  RADIO_STATIONS.forEach((station, index) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = station.name;
    btn.onclick = () => playRadioStation(index);
    list.appendChild(btn);
  });
}

function updateRadioActiveButton(){
  const list = document.getElementById("radioStationList");
  if(!list) return;

  Array.from(list.children).forEach((btn, index) => {
    btn.classList.toggle("active", index === radioCurrentIndex);
  });
}

function stopRadioHls(){
  if(radioHls){
    radioHls.destroy();
    radioHls = null;
  }
}

function playRadioStation(index){
  const audio = document.getElementById("radioAudio");
  const statusEl = document.getElementById("radioStatus");
  const station = RADIO_STATIONS[index];
  if(!audio || !station) return;

  radioCurrentIndex = index;
  updateRadioActiveButton();

  statusEl.textContent = "йҖЈз·ҡдёӯ... " + station.name;

  stopRadioHls();

  if(station.isHls){
    // .m3u8 ж јејҸ:Safari еҺҹз”ҹж”ҜжҸҙ,е…¶д»–зҖҸиҰҪеҷЁз”Ё hls.js еҮҪејҸеә«ж’ӯж”ҫ
    if(audio.canPlayType("application/vnd.apple.mpegurl")){
      audio.src = station.url;
    }else if(window.Hls && window.Hls.isSupported()){
      radioHls = new window.Hls();
      radioHls.loadSource(station.url);
      radioHls.attachMedia(audio);
      radioHls.on(window.Hls.Events.ERROR, function(event, data){
        if(data && data.fatal){
          statusEl.textContent = station.name + " дёІжөҒзҷјз”ҹйҢҜиӘӨ";
        }
      });
    }else{
      statusEl.textContent = "жӯӨзҖҸиҰҪеҷЁдёҚж”ҜжҸҙйҖҷеҖӢдёІжөҒж јејҸ";
      return;
    }
  }else{
    audio.src = station.url;
  }

  audio.play()
    .then(() => {
      statusEl.textContent = "жӯЈеңЁж’ӯж”ҫ:" + station.name;
      document.getElementById("radioPlayBtn").textContent = "вҸё";
    })
    .catch(() => {
      statusEl.textContent = station.name + " ж’ӯж”ҫеӨұж•—,еҸҜиғҪжҳҜдёІжөҒе·ІеӨұж•Ҳ";
    });
}

function toggleRadioPlay(){
  const audio = document.getElementById("radioAudio");
  const statusEl = document.getElementById("radioStatus");
  const playBtn = document.getElementById("radioPlayBtn");
  if(!audio) return;

  if(radioCurrentIndex === -1){
    playRadioStation(0);
    return;
  }

  if(audio.paused){
    audio.play()
      .then(() => {
        playBtn.textContent = "вҸё";
        statusEl.textContent = "жӯЈеңЁж’ӯж”ҫ:" + RADIO_STATIONS[radioCurrentIndex].name;
      })
      .catch(() => {
        statusEl.textContent = "ж’ӯж”ҫеӨұж•—,еҸҜиғҪжҳҜдёІжөҒе·ІеӨұж•Ҳ";
      });
  }else{
    audio.pause();
    playBtn.textContent = "в–¶";
    statusEl.textContent = "е·Іжҡ«еҒң:" + RADIO_STATIONS[radioCurrentIndex].name;
  }
}

function setRadioVolume(value){
  const audio = document.getElementById("radioAudio");
  if(audio) audio.volume = parseFloat(value);
}

document.addEventListener("DOMContentLoaded", function(){
  buildRadioStationButtons();

  const audio = document.getElementById("radioAudio");
  if(audio){
    audio.volume = 0.8;
    audio.addEventListener("error", function(){
      const statusEl = document.getElementById("radioStatus");
      if(radioCurrentIndex !== -1 && statusEl){
        statusEl.textContent = RADIO_STATIONS[radioCurrentIndex].name + " дёІжөҒзҷјз”ҹйҢҜиӘӨ";
      }
    });
  }

  // ===== рҹ“· CCTV еҚіжҷӮеҪұеғҸ:зҪ®дёӯеҪҲеҮәиҰ–зӘ—,е®ҡжңҹиҮӘеӢ•йҮҚж–°йҖЈз·ҡйҒҝе…ҚдёІжөҒж–·жҺүеҫҢз•«йқўеҚЎдҪҸ =====
  const cctvImage = document.getElementById("cctvImage");
  const cctvStatus = document.getElementById("cctvStatus");
  const cctvOverlay = document.getElementById("cctvOverlay");
  const cctvPanelTitle = document.getElementById("cctvPanelTitle");
  let CCTV_BASE_URL = "";
  let CCTV_CURRENT_LABEL = "";
  const CCTV_REFRESH_INTERVAL = 8000; // жҜҸ 8 з§’дё»еӢ•йҮҚж–°йҖЈз·ҡдёҖж¬Ў

  let cctvReloadTimer = null;

  function scheduleCctvReload(delay){
    // еҸӘз”ЁдёҖеҖӢиЁҲжҷӮеҷЁ,жҺ’ж–°зҡ„д№ӢеүҚе…ҲеҸ–ж¶ҲиҲҠзҡ„,йҒҝе…Қе…©еҖӢйҮҚйҖЈеӢ•дҪңдә’зӣёжү“жһ¶
    if(cctvReloadTimer){
      clearTimeout(cctvReloadTimer);
    }
    cctvReloadTimer = setTimeout(reloadCctvImage, delay);
  }

  function reloadCctvImage(){
    if(!cctvImage || !CCTV_BASE_URL) return;
    cctvImage.src = CCTV_BASE_URL + "&_t=" + Date.now();
    // жҜҸж¬ЎйҮҚйҖЈд№ӢеҫҢ,йҮҚж–°жҺ’дёӢдёҖж¬Ўзҡ„е®ҡжңҹйҮҚйҖЈ(дёҚз®ЎйҖҷж¬ЎжҳҜжӯЈеёёжҺ’зЁӢйӮ„жҳҜйҢҜиӘӨи§ёзҷјзҡ„)
    scheduleCctvReload(CCTV_REFRESH_INTERVAL);
  }

  // еҲҮжҸӣеҲ°ең°ең–дёҠй»һйҒёзҡ„жҹҗдёҖж”ҜзӣЈиҰ–еҷЁ,дёҰжү“й–ӢзҪ®дёӯеҪҲеҮәиҰ–зӘ—
  // camId: и©ІзӣЈиҰ–еҷЁзҡ„ id(з”Ёж–јиҝҪи№Өзӣ®еүҚйЎҜзӨәдёӯзҡ„жҳҜе“ӘдёҖж”Ҝ,йҒҝе…ҚйҮҚиӨҮи§ёзҷј)
  // isAuto: true д»ЈиЎЁжҳҜгҖҢе®ҡдҪҚз¶“йҒҺиҮӘеӢ•йЎҜзӨәгҖҚи§ёзҷјзҡ„,false д»ЈиЎЁжҳҜжүӢеӢ•й»һж“Ҡең–зӨәи§ёзҷјзҡ„
  window.switchCctvCamera = function(url, label, camId, isAuto){
    CCTV_BASE_URL = url;
    CCTV_CURRENT_LABEL = label;
    if(cctvPanelTitle) cctvPanelTitle.textContent = "рҹ“· " + label;
    if(cctvOverlay) cctvOverlay.classList.add("show");
    window.cctvActiveCameraId = camId || null;
    window.cctvActiveIsAuto = !!isAuto;
    reloadCctvImage();
  };

  // й—ңй–үеҪҲеҮәиҰ–зӘ—жҷӮ,еҒңжӯўйҮҚйҖЈиЁҲжҷӮеҷЁ,йҒҝе…ҚеңЁиғҢжҷҜдёҖзӣҙи·‘жөӘиІ»ж•ҲиғҪ
  window.closeCctvOverlay = function(){
    if(cctvOverlay) cctvOverlay.classList.remove("show");
    if(cctvReloadTimer){
      clearTimeout(cctvReloadTimer);
      cctvReloadTimer = null;
    }
    CCTV_BASE_URL = "";
    window.cctvActiveCameraId = null;
    window.cctvActiveIsAuto = false;
  };

  // ===== рҹ–ұпёҸ и®“еҪҲеҮәиҰ–зӘ—еҸҜд»ҘжӢ–еӢ•(жҠ“жЁҷйЎҢеҲ—з•¶жҠҠжүӢ,ж»‘йј /и§ёжҺ§йғҪж”ҜжҸҙ) =====
  if(cctvOverlay && cctvPanelTitle){
    let dragStartX = 0;
    let dragStartY = 0;
    let overlayStartLeft = 0;
    let overlayStartTop = 0;
    let dragging = false;

    function getPointerXY(e){
      if(e.touches && e.touches.length){
        return { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
      return { x: e.clientX, y: e.clientY };
    }

    function startDrag(e){
      dragging = true;
      const rect = cctvOverlay.getBoundingClientRect();
      // з¬¬дёҖж¬ЎжӢ–еӢ•жҷӮ,жҠҠе®ҡдҪҚеҫһгҖҢзҪ®дёӯе…¬ејҸгҖҚжҸӣжҲҗеӣәе®ҡзҡ„еғҸзҙ еә§жЁҷ,д№ӢеҫҢжүҚиғҪз”Ё left/top иҮӘз”ұз§»еӢ•
      cctvOverlay.style.left = rect.left + "px";
      cctvOverlay.style.top = rect.top + "px";
      cctvOverlay.style.transform = "none";

      overlayStartLeft = rect.left;
      overlayStartTop = rect.top;

      const p = getPointerXY(e);
      dragStartX = p.x;
      dragStartY = p.y;

      e.preventDefault();
    }

    function onDragMove(e){
      if(!dragging) return;
      const p = getPointerXY(e);
      const dx = p.x - dragStartX;
      const dy = p.y - dragStartY;
      cctvOverlay.style.left = (overlayStartLeft + dx) + "px";
      cctvOverlay.style.top = (overlayStartTop + dy) + "px";
    }

    function stopDrag(){
      dragging = false;
    }

    cctvPanelTitle.addEventListener("mousedown", startDrag);
    cctvPanelTitle.addEventListener("touchstart", startDrag, { passive: false });

    document.addEventListener("mousemove", onDragMove);
    document.addEventListener("touchmove", onDragMove, { passive: false });

    document.addEventListener("mouseup", stopDrag);
    document.addEventListener("touchend", stopDrag);
  }

  if(cctvImage){
    cctvImage.addEventListener("load", function(){
      if(cctvStatus) cctvStatus.textContent = CCTV_CURRENT_LABEL;
    });

    cctvImage.addEventListener("error", function(){

      scheduleCctvReload(3000);

});
