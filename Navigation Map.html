<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Navigation Map</title>
<style>
/* ===== OpenStreetMap Layer ===== */
#map{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:0;
} 

/* UI must be above map */
.rect2,.bottomBar,.rect4{
  z-index:2;
}

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#C5DCF0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

/* ===== 底部整組（原形一起移動） ===== */
.bottomBar{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:96px;
}

.rect1{
  box-sizing:border-box;
  position:absolute;
  left:8px;
  right:8px;
  top:0;
  height:96px;
  border-width:2px 2px 0 2px;
  border-style:solid;
  border-color:#FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);
  border-radius:11px 11px 0 0;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.rect3{
  position:absolute;
  width:46px;
  height:4px;
  left:50%;
  top:5px;
  transform:translateX(-50%);
  background:#74767A;
  box-shadow:0 4px 4px rgba(0,0,0,0.25), 0 4px 4px rgba(0,0,0,0.25);
  border-radius:2.5px;
}

.info{
  position:absolute;
  left:50%;
  top:11px;
  transform:translateX(-50%);
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:20px;
  color:#000000;
  white-space:nowrap;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}

/* ===== Rectangle 4 ===== */
.rect4{
  box-sizing:border-box;
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:106px;
  width:174px;
  height:33px;
  background:#FFFFFF;
  border:2px solid #FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  border-radius:16.5px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0px;
  z-index:5;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}

.rect4 .label{
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
  font-weight:500;
  font-size:16px;
  color:#000000;
  text-shadow:0 4px 4px rgba(0,0,0,0.25);
}

.rect4 .icon{
  width:20px;
  height:20px;
  background:url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/2c/TWHW3.svg/120px-TWHW3.svg.png') center/cover no-repeat;
  filter:drop-shadow(0px 4px 4px rgba(0,0,0,0.25));
  display:none;
}

/* ===== Rectangle 8 ===== */
.rect8{
  position:absolute;
  width:calc(100% - 16px);
  height:69px;
  left:8px;
  top:54px;
  background:#0E1A2D;
  border-radius:12px;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
}

/* ===== Rectangle 6（GPS圓形：中間顯示速度） ===== */
.rect6{
  position:absolute;
  width:76px;
  height:76px;
  left:8px;
  top:132px;
  background:#FFFFFF;
  box-shadow:0 4px 4px rgba(0,0,0,0.25);
  border-radius:38px;

  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction: column;

  font-size:24px;
  font-weight:400;
  color:#000000;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

.rect6 .speed-value {
  font-size: 32px;
  font-weight: 600;
}

.rect6 .speed-unit {
  font-size: 12px;
  font-weight: 400;
}
/* ===== 全部 Marker 圖示統一大小 ===== */
.trafficPanel{
  position:absolute;
  right:10px;
  top:74px;
  width:168px;
  padding:10px;
  box-sizing:border-box;
  background:rgba(255,255,255,0.88);
  border:1px solid rgba(255,255,255,0.95);
  box-shadow:0 6px 18px rgba(14,26,45,0.18);
  border-radius:8px;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  z-index:4;
  font-family:"SF Pro Display","SF Pro Text",Arial,sans-serif;
}

.trafficPanelTitle{
  font-size:13px;
  font-weight:700;
  color:#0E1A2D;
  margin-bottom:7px;
}

.trafficStatus{
  min-height:28px;
  margin-bottom:8px;
  color:#36445A;
  font-size:11px;
  line-height:14px;
}

.trafficActions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}

.trafficActions button{
  height:30px;
  border:0;
  border-radius:8px;
  color:#FFFFFF;
  font-size:12px;
  font-weight:700;
  box-shadow:0 2px 5px rgba(0,0,0,0.16);
}

.trafficActions button:active{
  transform:translateY(1px);
}

.report-stop{background:#D84536;}
.report-jam{background:#F28C28;}
.report-slow{background:#D7AA18;}
.report-clear{background:#1F9D55;}

.maplibregl-marker img{
  width:40px !important;
  height:auto !important;
  object-fit:contain;
  display:block;
}
/* ===== 📍 使用者定位藍色圖標 ===== */
.maplibregl-user-location-dot{
  background-color:#1E90FF !important;
  width:14px !important;
  height:14px !important;
  border-radius:50%;
  border:2px solid #ffffff !important;
  box-shadow:0 0 0 6px rgba(30,144,255,0.25);
}

.maplibregl-user-location-accuracy-circle{
  fill:rgba(30,144,255,0.15) !important;
}

/* 🔒 Lock UI (prevent page move) */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
}

body {
  touch-action: none;
}

/* 🔒 Lock UI (fixed version) */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  touch-action: none;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="rect8"></div>

<div class="rect6">
  <div class="speed-value">0</div>
  <div class="speed-unit">km/h</div>
</div>

<div class="trafficPanel">
  <div class="trafficPanelTitle">Live traffic</div>
  <div class="trafficStatus" id="trafficStatus">GPS will estimate nearby road speed</div>
  <div class="trafficActions">
    <button class="report-stop" type="button" onclick="reportCrowdTraffic('stop')">Stop</button>
    <button class="report-jam" type="button" onclick="reportCrowdTraffic('jam')">Jam</button>
    <button class="report-slow" type="button" onclick="reportCrowdTraffic('slow')">Slow</button>
    <button class="report-clear" type="button" onclick="reportCrowdTraffic('clear')">Clear</button>
  </div>
</div>

<div class="bottomBar">
  <div class="rect4">
    <div class="label" id="roadLabel"></div>
    <div class="icon"></div>
  </div>
  <div class="rect1"></div>
  <div class="rect3"></div>
  <div class="info">0小時0分鐘 0.00公里</div>
</div>

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js">map.dragRotate.disable();
map.touchZoomRotate.disableRotation();
map.boxZoom.disable();
map.scrollZoom.enable();
map.dragPan.enable();
</script>

<script>
// ===== 📍 Google-style 藍色定位點 =====
let userMarker = null;

function updateUserLocation(position) {
  const lng = position.coords.longitude;
  const lat = position.coords.latitude;

  const el = document.createElement('div');
  el.style.width = '16px';
  el.style.height = '16px';
  el.style.borderRadius = '50%';
  el.style.background = '#2F80FF';
  el.style.border = '3px solid white';
  el.style.boxShadow = '0 0 10px rgba(47,128,255,0.6)';

  if (userMarker) userMarker.remove();

  userMarker = new maplibregl.Marker({ element: el, anchor: 'center' })
    .setLngLat([lng, lat])
    .addTo(map);

  map.easeTo({ center: [lng, lat], zoom: 16 });
}

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(updateUserLocation);
}
</script>
<script src="https://unpkg.com/@maplibre/maplibre-gl-geocoder/dist/maplibre-gl-geocoder.min.js"></script>
<script>
  const map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/liberty',
    center: [121.394, 24.951],
    zoom: 16,
    pitch: 60, // 🔥 3D視角
    bearing: -20,
    antialias: true
  });

  // ===== 🔥 3D 建築 =====
  map.on('load',()=>{

// ===== 📍 使用 Google 類型藍點定位 =====
const geolocate = new maplibregl.GeolocateControl({
  positionOptions: {
    enableHighAccuracy: true
  },
  trackUserLocation: true,
  showUserHeading: true
});

map.addControl(geolocate);

// 自動啟動定位
geolocate.trigger();
    const layers = map.getStyle().layers;
    let labelLayerId;

    for (let i = 0; i < layers.length; i++) {
      if (layers[i].type === 'symbol') {
        labelLayerId = layers[i].id;
        break;
      }
    }

    map.addLayer(
      {
        id: '3d-buildings',
        source: 'openmaptiles',
        'source-layer': 'building',
        type: 'fill-extrusion',
        minzoom: 15,
        paint: {
        'fill-extrusion-height': 0.1,
        'fill-extrusion-base': 0,
          'fill-extrusion-color': '#aaa',
          'fill-extrusion-height': [
            'interpolate',
            ['linear'],
            ['zoom'],
            15,
            0,
            15.05,
            ['get', 'height']
          ],
          'fill-extrusion-base': [
            'interpolate',
            ['linear'],
            ['zoom'],
            15,
            0,
            15.05,
            ['get', 'min_height']
          ],
          'fill-extrusion-opacity': 0.8
        }
      },
      labelLayerId
    );
  });
  map.addControl(new maplibregl.NavigationControl());

  // ===== Crowd traffic speed layer =====
  const trafficStatusElement = document.getElementById('trafficStatus');
  const trafficStorageKey = 'navigation-map-traffic-reports-v3';
  const trafficReportMaxAge = 24 * 60 * 60 * 1000;
  let trafficSegments = [];
  let liveTrafficProbe = null;
  let activeTrafficSegmentId = null;
  let lastTrafficMotionPoint = null;
  let hasTrafficMovementStarted = false;
  let lastSavedTrafficSampleAt = 0;
  let lastTrafficFetchAt = 0;
  let lastTrafficFetchCenter = null;
  let trafficFetchInFlight = false;

  function loadTrafficReports(){
    try{
      return JSON.parse(localStorage.getItem(trafficStorageKey) || '[]');
    }catch(e){
      return [];
    }
  }

  function saveTrafficReports(reports){
    localStorage.setItem(trafficStorageKey, JSON.stringify(reports.slice(-300)));
  }

  function reportTypeToSpeed(type){
    if(type === 'stop') return 3;
    if(type === 'jam') return 12;
    if(type === 'slow') return 25;
    return 50;
  }

  function getTrafficColor(speed){
    if(speed <= 8) return '#D84536';
    if(speed <= 18) return '#F28C28';
    if(speed <= 32) return '#D7AA18';
    return '#1F9D55';
  }

  function normalizeRoadName(tags, fallbackId){
    return tags.name || tags.ref || tags['name:zh'] || `Road ${fallbackId}`;
  }

  async function fetchRealTrafficSegments(lng, lat, force){
    if(trafficFetchInFlight) return;

    const now = Date.now();
    if(!force && lastTrafficFetchCenter){
      const movedKm = calculateDistance(lastTrafficFetchCenter.lat, lastTrafficFetchCenter.lng, lat, lng);
      if(now - lastTrafficFetchAt < 45000 && movedKm < 0.25) return;
    }

    trafficFetchInFlight = true;
    lastTrafficFetchAt = now;
    lastTrafficFetchCenter = { lng, lat };

    try{
      if(trafficStatusElement) trafficStatusElement.innerText = 'Loading real roads...';

      const query = `
      [out:json][timeout:12];
      way(around:650,${lat},${lng})["highway"]["highway"!~"footway|path|steps|cycleway|pedestrian|service|track|corridor|construction"];
      out tags geom;
      `;

      const res = await fetch('https://overpass-api.de/api/interpreter', {
        method: 'POST',
        body: query
      });
      const data = await res.json();

      const segments = (data.elements || [])
        .filter(el => el.type === 'way' && el.geometry && el.geometry.length > 1)
        .map(el => ({
          id: `osm-${el.id}`,
          name: normalizeRoadName(el.tags || {}, el.id),
          coordinates: el.geometry.map(point => [point.lon, point.lat])
        }))
        .slice(0, 28);

      if(segments.length){
        trafficSegments = segments;
        refreshTrafficLayer();
        if(trafficStatusElement) trafficStatusElement.innerText = `Loaded ${segments.length} real roads`;
      }else if(trafficStatusElement){
        trafficStatusElement.innerText = 'No nearby driveable roads found';
      }
    }catch(e){
      console.log('traffic road fetch error', e);
      if(trafficStatusElement) trafficStatusElement.innerText = 'Real road data unavailable';
    }finally{
      trafficFetchInFlight = false;
    }
  }

  function getSegmentCenter(segment){
    const mid = Math.floor(segment.coordinates.length / 2);
    return segment.coordinates[mid];
  }

  function lngLatToMeters(lng, lat, originLat){
    const metersPerDegreeLat = 111320;
    const metersPerDegreeLng = 111320 * Math.cos(originLat * Math.PI / 180);
    return {
      x: lng * metersPerDegreeLng,
      y: lat * metersPerDegreeLat
    };
  }

  function getPointToLineDistanceMeters(lng, lat, coordinates){
    if(!coordinates || coordinates.length < 2) return Infinity;

    const point = lngLatToMeters(lng, lat, lat);
    let minDistance = Infinity;

    for(let i = 0; i < coordinates.length - 1; i++){
      const a = lngLatToMeters(coordinates[i][0], coordinates[i][1], lat);
      const b = lngLatToMeters(coordinates[i + 1][0], coordinates[i + 1][1], lat);
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const lengthSquared = dx * dx + dy * dy;
      const t = lengthSquared === 0
        ? 0
        : Math.max(0, Math.min(1, ((point.x - a.x) * dx + (point.y - a.y) * dy) / lengthSquared));
      const projectedX = a.x + t * dx;
      const projectedY = a.y + t * dy;
      const distance = Math.hypot(point.x - projectedX, point.y - projectedY);

      if(distance < minDistance) minDistance = distance;
    }

    return minDistance;
  }

  function findNearestTrafficSegment(lng, lat){
    if(!trafficSegments.length) return null;

    let nearest = null;
    let minDistance = Infinity;
    let activeSegment = null;
    let activeDistance = Infinity;

    trafficSegments.forEach(segment => {
      const distance = getPointToLineDistanceMeters(lng, lat, segment.coordinates);
      if(distance < minDistance){
        minDistance = distance;
        nearest = segment;
      }
      if(segment.id === activeTrafficSegmentId){
        activeSegment = segment;
        activeDistance = distance;
      }
    });

    if(activeSegment && activeDistance <= 18 && minDistance > activeDistance - 8){
      return {
        ...activeSegment,
        distanceMeters: activeDistance
      };
    }

    if(minDistance > 18) {
      activeTrafficSegmentId = null;
      return null;
    }

    activeTrafficSegmentId = nearest.id;

    return {
      ...nearest,
      distanceMeters: minDistance
    };
  }

  function saveActualTrafficSample(segment, speed, type, lng, lat){
    const now = Date.now();
    const nearbySegmentIds = trafficSegments
      .filter(item => item.id !== segment.id && getPointToLineDistanceMeters(lng, lat, item.coordinates) <= 26)
      .map(item => item.id);
    const reports = loadTrafficReports().filter(report => {
      const isFresh = now - report.time < trafficReportMaxAge;
      const isNearbyOtherGps = report.source === 'gps' && nearbySegmentIds.includes(report.segmentId);
      return isFresh && !isNearbyOtherGps;
    });
    reports.push({
      segmentId: segment.id,
      roadName: segment.name,
      speed: Math.max(0, Math.round(speed)),
      type,
      source: 'gps',
      lng,
      lat,
      time: now
    });
    saveTrafficReports(reports);
  }

  function buildTrafficData(){
    const now = Date.now();
    const reports = loadTrafficReports().filter(report => now - report.time < trafficReportMaxAge);
    if(reports.length !== loadTrafficReports().length) saveTrafficReports(reports);

    const lineFeatures = [];
    const labelFeatures = [];

    trafficSegments.forEach(segment => {
      const segmentReports = reports.filter(report => report.segmentId === segment.id);

      const reportSpeeds = segmentReports.map(report => report.speed);
      if(!reportSpeeds.length) return;

      const averageSpeed = Math.round(reportSpeeds.reduce((sum, speed) => sum + speed, 0) / reportSpeeds.length);
      const userCount = segmentReports.length;
      const labelPoint = getSegmentCenter(segment);

      lineFeatures.push({
        type: 'Feature',
        properties: {
          id: segment.id,
          name: segment.name,
          speed: averageSpeed,
          color: getTrafficColor(averageSpeed),
          users: userCount
        },
        geometry: {
          type: 'LineString',
          coordinates: segment.coordinates
        }
      });

      labelFeatures.push({
        type: 'Feature',
        properties: {
          label: `${averageSpeed} km/h`,
          color: getTrafficColor(averageSpeed),
          users: userCount
        },
        geometry: {
          type: 'Point',
          coordinates: labelPoint
        }
      });
    });

    return {
      lines: { type: 'FeatureCollection', features: lineFeatures },
      labels: { type: 'FeatureCollection', features: labelFeatures }
    };
  }

  function refreshTrafficLayer(){
    if(!map.getSource('crowd-traffic-lines')) return;
    const trafficData = buildTrafficData();
    map.getSource('crowd-traffic-lines').setData(trafficData.lines);
    map.getSource('crowd-traffic-labels').setData(trafficData.labels);
  }

  function setupTrafficLayer(){
    const trafficData = buildTrafficData();

    map.addSource('crowd-traffic-lines', {
      type: 'geojson',
      data: trafficData.lines
    });

    map.addLayer({
      id: 'crowd-traffic-lines',
      type: 'line',
      source: 'crowd-traffic-lines',
      layout: {
        'line-join': 'round',
        'line-cap': 'round'
      },
      paint: {
        'line-color': ['get', 'color'],
        'line-width': 8,
        'line-opacity': 0.82
      }
    });

    map.addSource('crowd-traffic-labels', {
      type: 'geojson',
      data: trafficData.labels
    });

    map.addLayer({
      id: 'crowd-traffic-labels',
      type: 'symbol',
      source: 'crowd-traffic-labels',
      layout: {
        'text-field': ['get', 'label'],
        'text-size': 13,
        'text-font': ['Noto Sans Bold'],
        'text-allow-overlap': true,
        'text-ignore-placement': true
      },
      paint: {
        'text-color': '#FFFFFF',
        'text-halo-color': '#0E1A2D',
        'text-halo-width': 2
      }
    });

    const center = map.getCenter();
    fetchRealTrafficSegments(center.lng, center.lat, true);
  }

  function handleAutoTrafficProbe(speedKmh, lng, lat, movedKm){
    if(lng == null || lat == null) return;
    fetchRealTrafficSegments(lng, lat, false);

    const movedMeters = (movedKm || 0) * 1000;
    if(movedMeters >= 6 || (Number.isFinite(speedKmh) && speedKmh >= 4)){
      hasTrafficMovementStarted = true;
    }

    if(!Number.isFinite(speedKmh) || (!hasTrafficMovementStarted && speedKmh < 4)){
      liveTrafficProbe = null;
      refreshTrafficLayer();
      if(trafficStatusElement) trafficStatusElement.innerText = 'Waiting for real GPS movement';
      return;
    }

    const nearest = findNearestTrafficSegment(lng, lat);
    if(!nearest){
      if(trafficStatusElement) trafficStatusElement.innerText = 'Finding real nearby roads...';
      return;
    }

    const inferredSpeed = Math.max(0, Math.round(speedKmh));
    liveTrafficProbe = {
      segmentId: nearest.id,
      speed: inferredSpeed,
      time: Date.now(),
      type: speedKmh < 5 ? 'stop' : 'auto'
    };

    if(Date.now() - lastSavedTrafficSampleAt > 10000){
      saveActualTrafficSample(nearest, inferredSpeed, speedKmh < 5 ? 'stop' : 'drive', lng, lat);
      lastSavedTrafficSampleAt = Date.now();
    }

    refreshTrafficLayer();
    if(trafficStatusElement){
      trafficStatusElement.innerText = `${nearest.name} recorded ${inferredSpeed} km/h`;
    }
  }

  window.reportCrowdTraffic = function(type){
    if(!lastPosition){
      if(trafficStatusElement) trafficStatusElement.innerText = 'Waiting for GPS before reporting';
      return;
    }

    const nearest = findNearestTrafficSegment(lastPosition.lon, lastPosition.lat);
    if(!nearest){
      fetchRealTrafficSegments(lastPosition.lon, lastPosition.lat, true);
      if(trafficStatusElement) trafficStatusElement.innerText = 'Finding real nearby roads...';
      return;
    }

    const reports = loadTrafficReports().filter(report => Date.now() - report.time < trafficReportMaxAge);
    const report = {
      segmentId: nearest.id,
      roadName: nearest.name,
      speed: reportTypeToSpeed(type),
      type,
      source: 'manual',
      time: Date.now()
    };

    reports.push(report);
    saveTrafficReports(reports);
    refreshTrafficLayer();

    if(trafficStatusElement){
      const label = type === 'stop' ? 'Stop' : type === 'jam' ? 'Jam' : type === 'slow' ? 'Slow' : 'Clear';
      trafficStatusElement.innerText = `Reported ${nearest.name}: ${label} ${report.speed} km/h`;
    }
  };

  map.on('load', setupTrafficLayer);
  setInterval(refreshTrafficLayer, 15000);

  // ===== Real GPS Tracking =====
  const infoElement = document.querySelector('.info');
  const rect6SpeedValue = document.querySelector('.rect6 .speed-value');
  const rect6SpeedUnit = document.querySelector('.rect6 .speed-unit');
  
  let startTime = null;
  let lastPosition = null;
  let totalDistance = 0;
  let routeCoordinates = [];
  let marker = null;
  let routeSource = null;

  // Add route source and layer to map
  map.on('load', () => {
    map.addSource('route', {
      type: 'geojson',
      data: {
        type: 'FeatureCollection',
        features: []
      }
    });

    // ===== 🔥 3D 區塊（fill-extrusion） =====
    map.addLayer({
      id: 'route',
      type: 'fill-extrusion',

  // Calculate distance between two coordinates using Haversine formula
  function calculateDistance(lat1, lon1, lat2, lon2) {
    const R = 6371; // Earth's radius in km
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = 
      Math.sin(dLat / 2) * Math.sin(dLat / 2) +
      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  // Format time display
  function formatTime(ms) {
    const totalSeconds = Math.floor(ms / 1000);
    const hours = Math.floor(totalSeconds / 3600);
    const minutes = Math.floor((totalSeconds % 3600) / 60);
    const seconds = totalSeconds % 60;
    return `${hours}小時${minutes}分鐘`;
  }

  // Update GPS info display
  function updateDisplay(speed, elapsedMs) {
    rect6SpeedValue.innerText = Math.round(speed);
    infoElement.innerText = `${formatTime(elapsedMs)} ${totalDistance.toFixed(2)}公里`;
  }

  if (navigator.geolocation) {
    navigator.geolocation.watchPosition((pos) => {
      const now = Date.now();
      const currentLat = pos.coords.latitude;
      const currentLon = pos.coords.longitude;
      const currentSpeed = pos.coords.speed || 0; // speed in m/s

      if (!startTime) {
        startTime = now;
        lastPosition = { lat: currentLat, lon: currentLon };
        routeCoordinates = [[currentLon, currentLat]];
      }

      // Calculate distance traveled
      if (lastPosition) {
        const distance = calculateDistance(lastPosition.lat, lastPosition.lon, currentLat, currentLon);
        totalDistance += distance;
        lastPosition = { lat: currentLat, lon: currentLon };
      }

      // Update route coordinates（避免GPS抖動亂畫）
      if (lastPosition) {
        const d = calculateDistance(lastPosition.lat, lastPosition.lon, currentLat, currentLon);
        if (d > 0.005) { // 大於5公尺才加入
          routeCoordinates.push([currentLon, currentLat]);
        }
      }

      // Update route on map
      if (routeSource) {
        routeSource.setData({
          type: 'FeatureCollection',
          features: [{
            type: 'Feature',
            geometry: {
              type: 'LineString',
              coordinates: routeCoordinates
            }
          }]
        });
      }

      // Update map center and marker
      map.flyTo({
        center: [currentLon, currentLat],
        zoom: 15,
        speed: 0.5
      });

      // Marker只建立一次
      if (!marker) {
        const el = document.createElement('div');
        el.style.width = '20px';
        el.style.height = '20px';
        el.style.backgroundColor = '#3b82f6';
        el.style.borderRadius = '50%';
        el.style.border = '2px solid white';
        el.style.boxShadow = '0 2px 4px rgba(0,0,0,0.3)';

        marker = new maplibregl.Marker(el).setLngLat([currentLon, currentLat]).addTo(map);
      } else {
        marker.setLngLat([currentLon, currentLat]);
      }

      // Calculate elapsed time
      const elapsedMs = now - startTime;

      // Convert speed from m/s to km/h
      const speedKmh = currentSpeed * 3.6;

      // Update display
      updateDisplay(speedKmh, elapsedMs);
      handleAutoTrafficProbe(speedKmh);
      // 🛣️ 即時道路偵測
      updateRoadName(currentLon, currentLat);
      console.log('road update trigger', currentLon, currentLat);
      updateRoadName(currentLon, currentLat);

    }, (err) => {
      console.error('GPS error:', err);
      rect6SpeedValue.innerText = '×';
      rect6SpeedUnit.innerText = 'GPS';
    }, {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 10000
    });
  } else {

<script>
// ===== 🛣️ 道路名稱自動偵測（Reverse Geocoding） =====
async function updateRoadName(lng, lat){
  try{
    const R = 6371e3;
    const toRad = Math.PI / 180;

    function getDistance(lat1, lon1, lat2, lon2){
      const dLat = (lat2 - lat1) * toRad;
      const dLon = (lon2 - lon1) * toRad;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*toRad)*Math.cos(lat2*toRad)*Math.sin(dLon/2)**2;
      return 2 * R * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    const query = `
    [out:json];
    way(around:10,${lat},${lng})["highway"]["name"];
    out center;
    `;

    const res = await fetch("https://overpass-api.de/api/interpreter", {
      method: "POST",
      // removed headers for compatibility
      body: query
    });

    const data = await res.json();

    let best = "未知道路";
    let min = Infinity;
    let bestTags = null;

    if(data.elements){
      for(const el of data.elements){
        if(!el.center || !el.tags?.name) continue;

        const d = getDistance(lat, lng, el.center.lat, el.center.lon);

        if(d < min){
          min = d;
          best = el.tags.name;
          bestTags = el.tags;
        }
      }
    }

    let isFreeway = false;

    if(bestTags){
      const hw = bestTags.highway || "";
      const ref = bestTags.ref || "";
      const name = bestTags.name || "";

      isFreeway =
        (hw === "motorway" && ref.includes("3")) ||
        name.includes("國道3") ||
        name.includes("國道三") ||
        name.includes("福爾摩沙");
    }

    const label = document.getElementById("roadLabel");
    const icon = document.querySelector(".rect4 .icon");

    if(label) label.innerText = best;

    if(icon){
      icon.style.display = isFreeway ? "block" : "none";
    }

  }catch(e){
    console.log("road name error", e);
  }
}
